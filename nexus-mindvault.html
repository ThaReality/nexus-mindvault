  ["Where does curry originate?",["South Asia (India, Sri Lanka, Bangladesh)","Thailand","The Middle East","West Africa"],0,"Curry isn't a single dish but a whole category of spiced dishes originating across South Asia. The word 'curry' comes from the Tamil word 'kari'. Britain's most popular dish is now widely considered to be chicken tikka masala — a British-Indian invention."],
  ["What is the significance of food in the Japanese tradition of Osechi Ryori?",["Special foods eaten at New Year to bring luck for the coming year","Seasonal foods eaten at harvest time","Foods offered to ancestors at funerals","Foods served only to royalty"],0,"Each Osechi food has symbolic meaning: black beans (good health), herring roe (fertility), shrimp (long life), and datemaki egg rolls (good wishes for learning). The foods are prepared in advance so families can rest and celebrate rather than cook over New Year."],
  ["Which country consumes the most tea per person in the world?",["Turkey","China","UK","India"],0,"Turkey consumes the most tea per person in the world — about 3.16 kg per person per year. Tea is central to Turkish social life and is offered to guests everywhere. The UK is famous for tea but ranks much lower in per-capita consumption."],
  ["What is the main ingredient in hummus?",["Chickpeas","Lentils","White beans","Sesame paste only"],0,"Hummus is made from chickpeas blended with tahini (sesame paste), lemon juice, garlic, and olive oil. It's been eaten across the Middle East for centuries. Countries including Israel, Lebanon, and Palestine all claim hummus as their own dish."],
  ["What is piri piri sauce, and where does it originate?",["A spicy sauce from Portugal and southern Africa","A Mexican hot sauce","An Indian chilli condiment","A Caribbean pepper sauce"],0,"Piri piri (also 'peri peri') takes its name from the Swahili for 'pepper pepper'. Portuguese explorers brought the chilli to Africa, where local species were cultivated. The sauce became part of both African and Portuguese cuisine — and was popularised globally by restaurant chains."],
  ["Which grain is the staple food for more than half the world's population?",["Rice","Wheat","Maize","Sorghum"],0,"Rice feeds more people than any other crop. It was first domesticated in China around 7,000 BCE. Over 40,000 varieties now exist. Asian countries consume about 90% of the world's rice production."],
  ["What is tagine?",["A North African slow-cooked stew named after the clay pot it's cooked in","A Moroccan salad","A type of flatbread from Tunisia","An Egyptian dessert"],0,"The tagine pot's conical lid traps steam and returns condensation to the dish, keeping it moist with minimal water. Tagines typically combine meat with preserved lemons, olives, dried fruits, and spices like ras el hanout — a North African spice blend with up to 80 ingredients."],
  ["Which country produces the most of the world's cocoa (used to make chocolate)?",["Ivory Coast (Côte d'Ivoire)","Ghana","Brazil","Indonesia"],0,"Ivory Coast produces about 40% of the world's cocoa, followed by Ghana at about 15%. Together, West African nations produce about 70% of global cocoa. The cocoa tree originally comes from the Americas — it was brought to Africa by European colonists."],
  ["What is the cultural significance of sharing a meal in most African traditions?",["It represents community, unity, and respect for elders","It is only for special religious occasions","It is primarily a business activity","It is reserved for funerals and weddings only"],0,"Across Africa, communal eating from shared dishes represents ubuntu — the principle that 'I am because we are.' Meals are rarely eaten alone. Elders are always served first. Food is deeply connected to hospitality, and refusing offered food can be considered rude in many cultures."],
  ["What gives the Red Leicester cheese its distinctive orange colour?",["Annatto — a natural dye from the achiote plant","Carrots","Turmeric","Beta-carotene added artificially"],0,"Annatto comes from seeds of the achiote tree in Central and South America. It's also used to colour butter, margarine, and some smoked fish. Red Leicester has been made in Leicestershire since the 17th century."],
  ["What is the origin of the word 'sandwich'?",["Named after the Earl of Sandwich who ate meat between bread to avoid leaving the card table","From the French word 'sandwiche'","From a German bakery tradition","From a Roman military ration"],0,"John Montagu, the 4th Earl of Sandwich, popularised eating meat between slices of bread in the 1760s so he could keep gambling without getting his cards greasy. The idea was so convenient it spread rapidly and was named after him."],
  ["What is gari, and where is it commonly eaten?",["Fermented and roasted cassava flour, eaten across West Africa","A type of Ethiopian grain","A Ugandan fermented milk","A Congolese smoked fish"],0,"Gari is made from cassava (a root vegetable native to South America, brought to Africa by Portuguese traders). It's a staple across Ghana, Nigeria, Benin, and many other West African countries — eaten with stew, soaked in cold water with sugar, or as eba (cooked into a dough)."],
  ["Which country is the largest producer of bananas in the world?",["India","Ecuador","Philippines","Brazil"],0,"India is the world's largest banana producer, though Ecuador is the largest exporter. Bananas are technically berries in botanical terms — while strawberries are not! Over 1,000 varieties of banana exist, though most supermarkets sell only one: the Cavendish."],
  ["What is umami?",["The fifth basic taste, described as savoury or meaty","A type of Japanese seasoning","A cooking technique","A Korean fermentation method"],0,"Umami was identified by Japanese scientist Kikunae Ikeda in 1908. The word means 'pleasant savoury taste' in Japanese. It's found in foods like parmesan cheese, miso, soy sauce, mushrooms, tomatoes, and anchovies. The other four basic tastes are sweet, sour, salty, and bitter."],
],

maths:[
  ["What is the value of Pi (π) to two decimal places?",["3.14","3.16","3.12","3.18"],0,"Pi is irrational — its decimal places go on forever without repeating. As of 2023, it's been calculated to 100 trillion decimal places. It appears in formulas for circles, waves, probability, and even physics."],
  ["What do you call a number that can only be divided by 1 and itself?",["Prime number","Factor","Square number","Integer"],0,"There are infinitely many prime numbers. The largest known prime (as of 2024) has over 41 million digits. Primes are the 'atoms' of mathematics — every other number is made by multiplying primes together."],
  ["What is the Fibonacci sequence?",["Each number is the sum of the two before it","Each number doubles","Each number is squared","Each number adds 10"],0,"The Fibonacci sequence (1, 1, 2, 3, 5, 8, 13, 21…) appears throughout nature — sunflower seed spirals, pinecone scales, nautilus shells, and even galaxy arms follow Fibonacci patterns."],
  ["What is the only even prime number?",["2","4","6","8"],0,"Two is the only even prime because all other even numbers can be divided by 2. It's also the smallest prime number — a unique position that makes 2 special in many mathematical proofs."],
  ["What is a right angle in degrees?",["90°","45°","180°","60°"],0,"There are 360° in a full circle. This comes from ancient Babylonian astronomy — they divided the year into 360 days and the sky into 360 parts because 360 is divisible by many numbers: 1, 2, 3, 4, 5, 6, 8, 9, 10, 12..."],
  ["What is the name for a triangle with three equal sides?",["Equilateral","Isosceles","Scalene","Right-angled"],0,"An equilateral triangle has three equal sides and three angles of exactly 60° each. An isosceles triangle has two equal sides, and a scalene triangle has no equal sides."],
  ["What is 10 to the power of 100 called?",["A Googol","A Trillion","A Quadrillion","A Centillion"],0,"'Googol' was named by the 9-year-old nephew of mathematician Edward Kasner in 1920. It later inspired the company Google. A 'googolplex' is 10 to the power of a googol — a number larger than the number of atoms in the observable universe."],
  ["What does the mathematical symbol ∞ represent?",["Infinity","Zero","Pi","An undefined value"],0,"The infinity symbol (∞) was introduced by mathematician John Wallis in 1655. Infinity is not a number but a concept — and there are different 'sizes' of infinity. The mathematician Georg Cantor proved that some infinities are larger than others."],
  ["If you fold a piece of paper in half 42 times, how thick would it be?",["Enough to reach the Moon","As thick as a book","As tall as a house","About a metre thick"],0,"It's physically impossible to fold paper more than 7–8 times, but mathematically, 42 folds would produce a thickness of about 440,000 km — enough to reach the Moon. 103 folds would reach the edge of the observable universe!"],
  ["What is a 'perfect number'?",["A number equal to the sum of its proper divisors","A number divisible by 10","A number with no remainder when divided by 3","A prime squared"],0,"Six is the smallest perfect number: 1 + 2 + 3 = 6. The next perfect numbers are 28, 496, and 8,128. Only 51 perfect numbers are known, and all of them are even — though whether an odd perfect number exists remains an unsolved problem."],
  ["What is the name for the longest side of a right-angled triangle?",["Hypotenuse","Adjacent","Opposite","Tangent"],0,"The Pythagorean theorem: a² + b² = c², where c is the hypotenuse. This relationship was known to Babylonian and Indian mathematicians centuries before Pythagoras, but he (or his school) may have provided the first formal proof."],
  ["What is a prime factorisation?",["Breaking a number into its prime number components","Finding the largest prime smaller than a number","Dividing by the nearest perfect square","Adding consecutive primes"],0,"Every number greater than 1 has a unique prime factorisation — this is the Fundamental Theorem of Arithmetic. For example, 12 = 2 × 2 × 3. This property underlies modern cryptography and internet security."],
  ["What is the sum of all angles in any triangle?",["180°","360°","90°","270°"],0,"This is true for triangles on a flat surface. On a curved surface like a sphere, the angles add up to more than 180°. On a saddle-shaped surface, they add up to less — these are the geometries of Einstein's curved space-time!"],
  ["What is the concept of zero's main mathematical significance?",["It allows positional number systems and represents 'nothing'","It is the smallest prime number","It is always equal to infinity when divided","It was invented by the Romans"],0,"Zero was independently developed in India and Mesoamerica — the Romans had no symbol for it, which is why Roman numerals are so awkward for arithmetic. Without zero, modern mathematics, computing, and science would be impossible."],
  ["What is an irrational number?",["A number that cannot be expressed as a simple fraction","A negative number","A number larger than a million","A number divisible only by itself"],0,"Pi and the square root of 2 are famous irrational numbers. The ancient Greeks were shocked to discover that √2 cannot be expressed as a fraction — legend says they tried to hide this fact, and the mathematician who revealed it was drowned at sea."],
  ["What is a square number?",["A number multiplied by itself","A number with four equal factors","A number that ends in 0 or 5","A number divisible by 4"],0,"Square numbers form a pattern: 1, 4, 9, 16, 25, 36... The differences between consecutive square numbers are always consecutive odd numbers: 3, 5, 7, 9... This elegant pattern connects algebra, geometry, and number theory."],
  ["What is the formula for the area of a circle?",["π × r²","2 × π × r","π × d","r²"],0,"The area formula π r² means you square the radius and multiply by pi. The circumference (perimeter) of a circle is 2πr. Both formulas were derived by Archimedes around 250 BCE through a brilliant method of approximating circles with polygons."],
  ["What is a factorial? For example, what is 5! (5 factorial)?",["120","25","100","15"],0,"5! = 5 × 4 × 3 × 2 × 1 = 120. Factorials grow extraordinarily quickly — 20! has 19 digits. 70! has more possible values than there are atoms in the observable universe. They're fundamental to probability and combinatorics."],
  ["What do you call two numbers whose squares add up to the square of a third number?",["A Pythagorean triple","A prime pair","A perfect set","A Fibonacci relation"],0,"The simplest Pythagorean triple is 3, 4, 5 (9 + 16 = 25). Others include 5-12-13, 8-15-17, and 7-24-25. These appear in construction and architecture — Egyptians used 3-4-5 ropes to create right angles when building pyramids."],
  ["What is probability?",["A measure of how likely an event is to occur, from 0 to 1","The number of possible outcomes","The ratio of wins to losses","The square root of the number of attempts"],0,"A probability of 0 means impossible; 1 means certain. Tossing a fair coin has probability 0.5 for heads. Probability is used in everything from weather forecasting and medical research to insurance pricing and casino design."],
  ["What is the name of the branch of mathematics dealing with shapes, sizes, and properties of figures?",["Geometry","Algebra","Calculus","Trigonometry"],0,"Geometry (from Greek 'earth measurement') was originally developed to survey land. Euclid systematised it in the 3rd century BCE. Today it has branches from simple shapes to multidimensional spaces and curved geometries used in Einstein's relativity."],
  ["What is the largest possible interior angle sum in a convex polygon with 6 sides?",["720°","540°","900°","360°"],0,"The interior angles of any hexagon sum to 720°. The formula for any polygon is (n-2) × 180°, where n is the number of sides. A triangle: (3-2)×180=180°. A square: (4-2)×180=360°. A hexagon: (6-2)×180=720°."],
  ["What is the difference between mean, median, and mode?",["Mean is the average, median is the middle value, mode is the most common value","Mean is the biggest, median is the smallest, mode is the average","They all mean the same thing","Mode is the average, mean is the most common"],0,"These are three measures of 'central tendency'. Mean: add all values, divide by count. Median: middle value when sorted. Mode: most frequent value. Knowing which to use matters — the mean is sensitive to extreme values while the median is not."],
  ["What is the number system we use every day called?",["Decimal (base 10)","Binary (base 2)","Hexadecimal (base 16)","Octal (base 8)"],0,"Decimal (base 10) uses digits 0–9 and likely developed because humans have 10 fingers. Computers use binary (base 2) because electronic circuits are either on or off. Ancient Babylonians used base 60 — which is why we have 60 seconds in a minute and 360° in a circle."],
  ["What is a recurring decimal?",["A decimal that repeats a pattern forever","A decimal that terminates","A decimal larger than 1","A negative decimal"],0,"1/3 = 0.333... (the 3 repeats forever). 1/7 = 0.142857142857... (the pattern 142857 repeats). Every fraction results in either a terminating decimal (1/4 = 0.25) or a recurring decimal — there's no third option."],
  ["What is the Golden Ratio (approximately 1.618)?",["A proportion found throughout nature, art, and architecture","The ratio of a circle's circumference to diameter","The square root of 2","A ratio used only in architecture"],0,"The Golden Ratio (φ, phi) appears in the Fibonacci sequence (as you divide consecutive Fibonacci numbers, they approach φ), in the proportions of the Parthenon, Leonardo da Vinci's Vitruvian Man, and countless natural forms including spiral galaxies."],
  ["What is negative exponentiation? For example, what is 10⁻²?",["0.01 (one hundredth)","−100","−0.01","100"],0,"A negative exponent means 'divide by that power': 10⁻² = 1/10² = 1/100 = 0.01. This is fundamental to scientific notation — atomic radii are expressed as 10⁻¹⁰ metres, meaning 0.0000000001 metres."],
  ["What is the mathematical term for the study of rates of change?",["Calculus","Trigonometry","Statistics","Number theory"],0,"Calculus was independently developed by Newton and Leibniz in the 17th century. It has two branches: differential calculus (rates of change) and integral calculus (areas and accumulation). It underlies virtually all of modern physics, engineering, and economics."],
  ["What is a Venn diagram used for?",["Showing overlapping sets or groups","Drawing graphs of equations","Plotting statistical data","Representing fractions"],0,"Venn diagrams were introduced by logician John Venn in 1880. They're used in mathematics, logic, statistics, computer science, and linguistics to show relationships between sets — particularly what is shared and what is unique to each group."],
  ["What is the relationship between a circle's circumference and its diameter?",["The circumference is always pi times the diameter","The circumference is always twice the diameter","The circumference equals the radius squared","The circumference is always three times the diameter"],0,"C = πd (or C = 2πr). This ratio — pi — is the same for every circle in the universe, regardless of size. This profound mathematical constant connects circles, spheres, waves, and even probability distributions."],
  ["What is a composite number?",["A number that has more than two factors","A number that is both prime and even","A number greater than 1,000","A number divisible by 10"],0,"Every whole number greater than 1 is either prime (exactly two factors: 1 and itself) or composite (more than two factors). The number 1 is neither prime nor composite — it's in a special category of its own."],
  ["What is long multiplication used for?",["Multiplying large numbers by breaking them into smaller parts","Finding the area of a rectangle","Converting between number systems","Adding fractions"],0,"Long multiplication is an algorithm (a step-by-step procedure) for multiplying multi-digit numbers. Algorithms like this are the foundation of computer science — a computer program is essentially a very precise algorithm executed at high speed."],
  ["What is the name for an angle greater than 180° but less than 360°?",["Reflex angle","Obtuse angle","Acute angle","Straight angle"],0,"Angles are classified by size: acute (less than 90°), right (exactly 90°), obtuse (90°–180°), straight (exactly 180°), reflex (180°–360°), and full rotation (360°). Each type appears in different geometric contexts."],
  ["What is the Möbius strip?",["A surface with only one side and one edge","A type of spiral in number theory","A complex 3D shape with no corners","A repeating decimal pattern"],0,"You can make a Möbius strip by taking a strip of paper, giving it a half-twist, and joining the ends. A line drawn along the middle will cover the entire strip and return to the starting point without ever lifting the pen. It's a topological marvel that inspired art, engineering, and science."],
],

language:[
  ["How many languages are spoken in the world today?",["Around 7,000","Around 1,000","Around 200","Around 500"],0,"Of the ~7,000 languages, nearly half are endangered with fewer than 1,000 speakers. One language dies approximately every two weeks. Papua New Guinea alone has over 800 distinct languages."],
  ["What is the most widely spoken language by total number of speakers?",["Mandarin Chinese","English","Spanish","Hindi"],0,"Mandarin has over 1.1 billion speakers. However, English is used by more people as a first or second language combined, and is the dominant language of international business, science, aviation, and the internet."],
  ["What does 'etymology' mean?",["The study of word origins","The study of insects","The study of grammar","The study of languages"],0,"Etymology traces how words evolved over centuries. The word 'salary' comes from Latin 'salarium' — Roman soldiers were sometimes paid in salt, which was so valuable it gave us the phrase 'worth one's salt.'"],
  ["Which writing system is the oldest still in use today?",["Chinese characters","Latin alphabet","Arabic script","Cyrillic alphabet"],0,"Chinese characters have been in continuous use for over 3,000 years. The system evolved from oracle bone inscriptions (used for divination) to modern simplified Chinese. About 3,500 characters are needed for everyday reading."],
  ["What is a 'loanword'?",["A word borrowed from another language","A word used only in formal writing","A word that changes meaning over time","A word unique to one dialect"],0,"English is full of loanwords: 'piano' (Italian), 'chocolate' (Nahuatl/Aztec), 'ketchup' (Hokkien Chinese), 'safari' (Arabic via Swahili), 'avatar' (Sanskrit), 'algebra' (Arabic), 'zombie' (Kongo language of Central Africa)."],
  ["How many letters are in the standard Arabic alphabet?",["28","26","24","30"],0,"Arabic is written right-to-left. It's the official language of 26 countries and the liturgical language of over 1.8 billion Muslims worldwide. Arabic gave English many words including 'algorithm', 'algebra', 'sugar', 'cotton', and 'coffee'."],
  ["What is the world's most translated book?",["The Bible","Don Quixote","Harry Potter","The Little Prince"],0,"The Bible has been fully or partially translated into over 3,500 languages. 'The Little Prince' by Antoine de Saint-Exupéry is the most translated work of fiction, with over 300 translations, including one in the constructed language Klingon."],
  ["What does the prefix 'bio-' mean?",["Life","Water","Earth","Science"],0,"Knowing Greek and Latin roots unlocks hundreds of English words at once: 'bio' (life), 'geo' (earth), 'hydro' (water), 'tele' (far), 'micro' (small), 'mega' (large), 'photo' (light), 'phono' (sound), 'graph' (writing)."],
  ["Which language family does English belong to?",["Indo-European","Sino-Tibetan","Afro-Asiatic","Austronesian"],0,"The Indo-European family includes English, French, Spanish, Portuguese, Hindi, Farsi, and Russian. Linguists believe all these languages descended from a common ancestor called Proto-Indo-European, spoken about 6,000 years ago."],
  ["What is a palindrome?",["A word or phrase that reads the same forwards and backwards","A word that means its own opposite","A very long compound word","A word borrowed from Greek"],0,"Examples: 'racecar', 'level', 'madam', 'kayak'. The sentence 'A man, a plan, a canal: Panama' is a famous palindrome. The word comes from Greek 'palindromos' meaning 'running back again'."],
  ["How many officially recognised languages does South Africa have?",["11","4","7","16"],0,"South Africa has 11 official languages: Zulu, Xhosa, Afrikaans, English, Northern Sotho, Tswana, Sotho, Tsonga, Swazi, Venda, and Ndebele. It has more official languages than any other country in the world."],
  ["What does the word 'safari' mean in Swahili?",["Journey or travel","Wild animals","Hunt","Adventure into the unknown"],0,"Swahili is spoken by over 200 million people across East and Central Africa. Other familiar English words from Swahili include 'hakuna matata' (no worries), 'simba' (lion), 'rafiki' (friend), and 'bwana' (sir/master)."],
  ["Which is the only letter that doesn't appear in any US state name?",["Q","X","Z","J"],0,"Q is the only letter absent from all 50 US state names. X appears in New Mexico and Texas, Z in Arizona, and J in New Jersey and New Mexico (wait — that's N!). Several letters appear only once: B (Nebraska), J (New Jersey), Q (absent), X (New Mexico/Texas)."],
  ["What is a 'cognate' in linguistics?",["Words in different languages sharing a common origin","Words that sound the same but mean different things","Words with opposite meanings","Words that have become obsolete"],0,"English and German cognates include: water/Wasser, father/Vater, mother/Mutter, book/Buch, house/Haus. English and Frisian (spoken in coastal Netherlands/Germany) are the most closely related language pair — a Frisian speaker can recognise some written English."],
  ["What is Braille?",["A tactile writing system using raised dots, used by blind and visually impaired people","A type of sign language","A simplified alphabet for children","A medieval writing system"],0,"Louis Braille developed his system at age 15 in 1824 after becoming blind in an accident. Each Braille character is made from combinations of 6 dots in a 2×3 grid, allowing 64 possible characters. It transformed literacy for millions of blind people worldwide."],
  ["What is onomatopoeia?",["Words that phonetically imitate the sounds they describe","Words that are their own opposite","Very old words from Latin","Words that have silent letters"],0,"Examples of onomatopoeia: buzz, hiss, crackle, splash, roar, tick-tock, sizzle. Different languages represent the same sounds differently — a dog says 'woof' in English but 'ouaf' in French, 'guau' in Spanish, and 'wan wan' in Japanese."],
  ["What is the most widely spoken language in Africa?",["Swahili","Arabic","Hausa","Zulu"],0,"If measured by native speakers, Hausa (spoken in Nigeria and Niger) has the most. But Swahili is the most widely spoken African language overall — used as a lingua franca across East and Central Africa. Arabic dominates in North Africa."],
  ["What is a 'dead language'?",["A language that no longer has any native speakers","A very old language","A language used only in writing","A language with fewer than 100 speakers"],0,"Latin is a famous dead language — it has no native speakers but remains extensively studied. Hebrew was a dead language for nearly 2,000 years before being revived as a living language in Israel in the 19th–20th century — the only major successful language revival in history."],
  ["What does it mean for a language to be 'tonal'?",["The pitch of a word changes its meaning","The language uses musical notes","The language is spoken very loudly","All words rhyme with each other"],0,"In Mandarin Chinese, the word 'ma' can mean mother (high flat tone), hemp (rising tone), horse (dipping tone), or scold (falling tone) depending on the tone used. About 70% of the world's languages are tonal, including most African and Southeast Asian languages."],
  ["What is the longest word in the English language?",["Pneumonoultramicroscopicsilicovolcanoconiosis (45 letters)","Antidisestablishmentarianism (28 letters)","Supercalifragilisticexpialidocious (34 letters)","Floccinaucinihilipilification (29 letters)"],0,"Pneumonoultramicroscopicsilicovolcanoconiosis is a type of lung disease caused by inhaling very fine silica or quartz dust. It was coined in 1935 specifically to be the longest word in a dictionary. 'Supercalifragilisticexpialidocious' was invented for Mary Poppins."],
  ["What is the difference between a dialect and a language?",["A dialect is a variety of a language; the distinction is often political rather than linguistic","A dialect has no writing system","A language is always older than a dialect","Dialects are always spoken more slowly"],0,"Linguist Max Weinreich's famous quote: 'A language is a dialect with an army and a navy.' Mandarin and Cantonese are called 'dialects' of Chinese but are mutually unintelligible — more different than Spanish and Portuguese. The distinction is often about politics and prestige, not linguistics."],
  ["Where does the word 'alphabet' come from?",["From the first two letters of the Greek alphabet: alpha and beta","From the Latin word for writing","From an ancient Phoenician word","From the Arabic for 'all letters'"],0,"The Greek alphabet was adapted from the Phoenician alphabet around 800 BCE. The Phoenicians had 22 consonants but no vowels — the Greeks added vowels. The Latin alphabet we use today descended directly from Greek, via the Etruscans."],
  ["What is a lingua franca?",["A shared language used between people who speak different native languages","A type of ancient Latin","A French dialect","A mixture of two languages"],0,"English functions as a global lingua franca today. Historically, Latin served this role in Europe, Swahili in East Africa, and Lingua Franca (a pidgin of Italian, Spanish, French, Greek, and Arabic) in Mediterranean ports — which is where the term originally came from."],
  ["How many tones does Cantonese Chinese have?",["6 (some say 9)","4","2","12"],0,"Cantonese has 6 tones in standard descriptions (9 if counting checked tones). Mandarin has 4 tones plus a neutral tone. Vietnamese has 6 tones. Tonal languages use pitch phonemically — to distinguish words — not just for emphasis as English does."],
  ["What is the Rosetta Stone?",["An ancient Egyptian stone slab with the same text in three scripts, enabling the decipherment of hieroglyphics","A stone used in ancient religious ceremonies","A dictionary of ancient Greek","A wall inscription in the tomb of a pharaoh"],0,"The Rosetta Stone was found in 1799 during Napoleon's Egypt campaign. It contains the same decree written in Ancient Egyptian hieroglyphics, Demotic script, and Ancient Greek. Thomas Young and Jean-François Champollion used it to crack hieroglyphics in 1822."],
  ["What does 'polyglot' mean?",["A person who knows or uses several languages","A type of language family","A language that borrows from many others","A study of ancient languages"],0,"Famous polyglots include: Cleopatra (9 languages), Pope John Paul II (8), Nelson Mandela (spoke 3 languages fluently), and linguist Alexander Arguelles (estimated 30+). The average European speaks 2 languages; many Africans routinely speak 3–5."],
  ["What is the significance of the letter 'W' being called 'double-u'?",["It was originally written as two 'u' or 'v' letters joined together","It makes a sound combining W and U","It was invented by two people called William and Ursula","It represents two separate sounds in Old English"],0,"Medieval scribes writing in Latin had no letter for the English 'w' sound. They doubled the letter 'u' (which looked like 'v' in those days): 'vv'. Over time these merged into a single character. French still calls it 'double vé' (double v), revealing the same history."],
  ["What is the most common letter in the English language?",["E","A","T","S"],0,"The letter E accounts for about 11–13% of all English text. This is why 'e' is the most valuable tile in Scrabble relative to its frequency, and why code-breakers working on substitution ciphers always look for the most frequent letter first — it's almost always E."],
  ["What is sign language?",["A visual-gestural language using hands, facial expressions, and body movements","A simplified version of spoken language","A universal language used by all deaf people","A code based on finger-spelling"],0,"Sign languages are fully developed, complex natural languages — not simplified versions of spoken languages. British Sign Language (BSL) and American Sign Language (ASL) are actually quite different from each other, even though both countries speak English. There are over 300 sign languages worldwide."],
  ["Which language has the most speakers in South America?",["Portuguese","Spanish","Quechua","English"],0,"Portuguese is spoken in Brazil (the continent's largest country) while Spanish dominates the rest. But Quechua, the language of the Inca Empire, is still spoken by about 8–11 million people across Peru, Bolivia, and Ecuador — making it the most widely spoken indigenous language in the Americas."],
  ["What is the difference between syntax and vocabulary?",["Syntax is the rules for arranging words; vocabulary is the set of words","Syntax is spoken, vocabulary is written","Syntax is for formal writing, vocabulary for informal speech","They mean the same thing"],0,"Syntax determines word order and grammatical structure ('The dog bit the man' vs 'The man bit the dog' — same words, opposite meanings). Vocabulary is the inventory of words available. Together with phonology (sounds) and morphology (word forms), they make up the structure of any language."],
  ["What ancient language do scientists use to name species, planets, and medical terms?",["Latin","Greek","Sanskrit","Classical Arabic"],0,"Latin remains the universal scientific naming language. Every species has a Latin (or Latinised) binomial name: Homo sapiens (wise man), Panthera leo (lion), Tyrannosaurus rex (tyrant lizard king). It was chosen because Latin was considered a neutral, unchanging language that wouldn't favour any modern nation."],
  ["What does the phrase 'to learn by heart' mean etymologically?",["Memory was thought to reside in the heart, not the brain","It means learning with passion","It was an old punishment — students were beaten with heart-shaped sticks if they forgot","It comes from the French 'par coeur' meaning to learn well"],0,"The phrase 'learning by heart' reflects the ancient belief (held by Aristotle) that the heart was the seat of intelligence and memory, not the brain. The ancient Egyptians discarded the brain during mummification but carefully preserved the heart — considered essential for the afterlife."],
  ["What is the grammatical concept of 'gender' in languages?",["A grammatical category assigning nouns to classes, not related to biological sex","The way languages describe male and female people","The tone used when speaking","The formal register of a language"],0,"French has masculine and feminine nouns; German has three genders (masculine, feminine, neuter). In French, a table ('la table') is feminine but a book ('le livre') is masculine — with no logical reason. English lost most grammatical gender in the Middle English period, which is why it's relatively easy to learn."],
],

oceans:[
  ["What is the longest river in the world?",["Nile","Amazon","Yangtze","Mississippi"],0,"The Nile and Amazon trade the top spot depending on measurement method. The Nile stretches about 6,650 km through 11 countries in northeastern Africa. The Amazon carries more water than the next seven largest rivers combined."],
  ["What is the highest mountain in the world?",["Mount Everest","K2","Kangchenjunga","Mauna Kea"],0,"Everest stands 8,848.86 m above sea level. But Mauna Kea in Hawaii is actually tallest from base to peak — most of it is underwater. Everest was first climbed on 29 May 1953 by Edmund Hillary and Tenzing Norgay."],
  ["What is the largest desert in the world?",["Antarctica","Sahara","Arabian","Gobi"],0,"Antarctica is technically the world's largest desert. A desert is defined by precipitation, not heat — Antarctica receives less than the Sahara. The Sahara is the largest hot desert at 9.2 million km²."],
  ["What is the deepest lake in the world?",["Lake Baikal","Lake Tanganyika","Caspian Sea","Lake Superior"],0,"Lake Baikal in Siberia is 1,642 m deep and contains about 20% of the world's unfrozen surface fresh water. It's the world's oldest lake at 25 million years and home to the only entirely freshwater seal — the Baikal seal (nerpa)."],
  ["Which ocean is the largest?",["Pacific","Atlantic","Indian","Arctic"],0,"The Pacific covers more area than all of Earth's land combined — about 165 million km². The Mariana Trench, the deepest point on Earth at nearly 11,000 m, is in the western Pacific."],
  ["What is the mountain range running along the spine of South America?",["The Andes","The Rockies","The Atlas Mountains","The Urals"],0,"The Andes is the longest continental mountain range at 7,000 km, running through seven countries. It contains the world's highest active volcano, Ojos del Salado (6,893 m), and gives rise to the Amazon River."],
  ["Which African country contains the largest portion of the Sahara Desert?",["Algeria","Libya","Sudan","Egypt"],0,"Algeria has the largest share of the Sahara. Only about 25% of the desert is sand — most is rocky gravel and stone. The Sahara was a green, lake-filled savanna just 6,000 years ago during the 'African Humid Period'."],
  ["What is the Great Barrier Reef?",["The world's largest coral reef system, off Australia","The deepest ocean trench","An underwater mountain range","A chain of Pacific islands"],0,"The Great Barrier Reef stretches 2,300 km off Queensland and is so large it's visible from space. It supports 1,500 fish species, 4,000 mollusc types, 30 whale species, and 6 turtle species. It's severely threatened by ocean warming from climate change."],
  ["Which continent has the most countries?",["Africa","Asia","Europe","Americas"],0,"Africa has 54 recognised countries — more than any other continent. It's also the world's second-largest continent by area (30.3 million km²) and population (1.4 billion people). It contains more countries than all of Europe and the Americas combined."],
  ["What is the Ring of Fire?",["A zone of volcanoes and earthquakes encircling the Pacific Ocean","A desert region","An ancient trade route","A chain of reefs"],0,"The Ring of Fire is a 40,000 km horseshoe shape containing 75% of the world's volcanoes and where 90% of earthquakes occur. It runs through New Zealand, Japan, the Philippines, Alaska, and the west coast of the Americas."],
  ["How much of the world's fresh water is locked in glaciers and ice caps?",["About 69%","About 30%","About 10%","About 50%"],0,"Most of Earth's fresh water is frozen, mainly in Antarctica (61%) and Greenland (8%). If the Greenland ice sheet melted entirely, sea levels would rise by about 7 metres, flooding coastal cities worldwide."],
  ["What is the name for the boundary where tectonic plates meet?",["A fault line or plate boundary","A rift zone","A continental shelf","A tidal plain"],0,"Tectonic plates move at about 2–10 cm per year — roughly the rate your fingernails grow. But over millions of years this has built the Himalayas, opened the Atlantic Ocean, and will eventually close the Mediterranean Sea."],
  ["What percentage of the ocean floor has been explored by humans?",["Around 20%","Over 80%","About 50%","Less than 5%"],0,"We know more about the surfaces of Mars and the Moon than we do about our own seafloor. The deep ocean — below 200 m — is one of Earth's last great unexplored frontiers, teeming with extraordinary creatures adapted to total darkness and crushing pressure."],
  ["Which two continents does the Ural Mountain range separate?",["Europe and Asia","Asia and Africa","North and South America","Africa and Europe"],0,"The Urals stretch 2,500 km through Russia and Kazakhstan. The Europe-Asia boundary is a geographic convention — they share one continuous landmass called Eurasia. Russia is transcontinental, with land in both Europe and Asia."],
  ["What is the name of the world's longest mountain range?",["Mid-Ocean Ridge","The Andes","The Rockies","The Himalayas"],0,"The Mid-Ocean Ridge is an underwater mountain range 65,000 km long, running through all the world's oceans. It marks where tectonic plates pull apart, creating new seafloor through volcanic activity. It's the world's longest geological feature."],
  ["Where is the Sahel region?",["A semi-arid belt south of the Sahara Desert across Africa","A coastal region of West Africa","A highland plateau in East Africa","A river delta region in North Africa"],0,"The Sahel (from Arabic meaning 'shore' or 'coast') stretches 5,400 km across Africa from Senegal to Eritrea — the 'shore' of the Saharan 'sea' of sand. It's one of the world's most climate-vulnerable regions, facing desertification, drought, and food insecurity."],
  ["What is a fjord?",["A long narrow sea inlet between steep cliffs, formed by glaciers","A type of sand dune","A coastal wetland","A wide river mouth"],0,"Fjords were carved by glaciers during ice ages. Norway has thousands — the Sognefjord is 205 km long and up to 1,308 m deep. New Zealand and Chile also have spectacular fjord coastlines."],
  ["Which country has the most natural lakes in the world?",["Canada","Russia","USA","Finland"],0,"Canada has about 31,752 lakes larger than 3 km² — more than any other country. It holds about 20% of the world's fresh surface water. The Great Lakes (shared with the USA) contain about 21% of the world's surface fresh water."],
  ["What is the Amazon Rainforest?",["The world's largest tropical rainforest, covering much of South America","The largest desert in South America","The largest river system in Africa","A mountain range in Brazil"],0,"The Amazon covers 5.5 million km² across Brazil, Peru, Colombia, and seven other countries. It produces 20% of the world's oxygen and is home to 10% of all species on Earth. It's often called 'the lungs of the planet', though technically it absorbs as much CO₂ as it produces."],
  ["What is the Serengeti famous for?",["Its annual wildebeest migration — the largest animal migration on Earth","Being Africa's highest point","The world's largest volcanic crater","Home to the world's largest elephant herd"],0,"About 1.5 million wildebeest, 500,000 zebras, and 200,000 gazelles make the annual circuit between Tanzania's Serengeti and Kenya's Masai Mara — following seasonal rains. It's been called the greatest wildlife spectacle on Earth."],

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let curSubj=null, curQ=null, answered=false;
let queue=[], qIdx=0, correct=0, total=0, streak=0;
let gCorrect=0, gTotal=0, gStreak=0;

const LETTERS=["A","B","C","D"];
const shuffle=a=>[...a].sort(()=>Math.random()-.5);

function subj(id){ return SUBJECTS.find(s=>s.id===id); }

/* ════════════════════════════════════════
   SCREENS
════════════════════════════════════════ */
function show(id){
  document.querySelectorAll('[id^="screen-"]').forEach(el=>el.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

function updateGlobalStats(){
  document.getElementById('g-correct').textContent=gCorrect;
  document.getElementById('g-total').textContent=gTotal;
  document.getElementById('g-streak').textContent=gStreak;
}

/* ════════════════════════════════════════
   HOME
════════════════════════════════════════ */
function buildHome(){
  const grid=document.getElementById('subject-grid');
  grid.innerHTML='';
  SUBJECTS.forEach(s=>{
    const el=document.createElement('div');
    el.className='subj-card';
    el.style.setProperty('--c',s.color);
    const pips=Array.from({length:3},(_,i)=>`<div class="diff-pip${i<s.diff?' on':''}"></div>`).join('');
    el.innerHTML=`
      <span class="subj-icon">${s.icon}</span>
      <div class="subj-name"><span class="subj-dot"></span>${s.name}</div>
      <div class="subj-meta">${s.desc}</div>
      <div class="diff-bar">${pips}</div>`;
    el.onclick=()=>startSubject(s.id);
    grid.appendChild(el);
  });
  show('home');
}

/* ════════════════════════════════════════
   QUIZ
════════════════════════════════════════ */
function startSubject(id){
  curSubj=subj(id);
  const bank=QB[id];
  queue=shuffle(bank).slice(0,Math.min(15,bank.length));
  qIdx=0; correct=0; total=0; streak=0; answered=false;
  show('quiz');
  renderQ();
}

function renderQ(){
  if(qIdx>=queue.length){ showEnd(); return; }
  curQ=queue[qIdx];
  answered=false;
  const s=curSubj;
  const pct=Math.round((qIdx/queue.length)*100);

  const inner=document.getElementById('quiz-inner');
  inner.innerHTML=`
    <div class="quiz-header">
      <button class="back-btn" onclick="buildHome()">← Subjects</button>
      <div class="quiz-subject-pill" style="--c:${s.color}">
        <span class="qsp-dot"></span>${s.icon} ${s.name}
      </div>
    </div>
    <div class="progress-row">
      <div class="prog-track"><div class="prog-fill" id="prog" style="width:${pct}%;--c:${s.color}"></div></div>
      <div class="prog-lbl" id="prog-lbl">${qIdx}/${queue.length}</div>
    </div>
    <div class="c-info">${queue.length} questions · ${QB[curSubj.id].length} in bank</div>
    <div class="q-card" style="--c:${s.color}">
      <div class="q-badge"><span class="q-num">Q${qIdx+1}</span> · ${s.name}</div>
      <div class="q-text">${curQ[0]}</div>
    </div>
    <div class="opts" id="opts"></div>
    <div id="fb-area"></div>
    <button class="next-btn" id="nxt" style="display:none;--c:${s.color}" onclick="advance()">Next question →</button>
  `;

  const container=document.getElementById('opts');
  const shuffledOpts=curQ[1].map((text,origIdx)=>({text,origIdx}));
  // keep original mapping for correct answer
  const displayOpts=curQ[1].map((text,i)=>({text,i}));
  // shuffle display but preserve answer lookup
  const display=shuffle(displayOpts);

  display.forEach(({text,i},pos)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.style.setProperty('--c',s.color);
    btn.innerHTML=`<span class="opt-ltr">${LETTERS[pos]}</span>${text}`;
    btn.dataset.orig=i;
    btn.onclick=()=>checkAnswer(btn,i===curQ[2],curQ[1][curQ[2]],curQ[3]);
    container.appendChild(btn);
  });
}

function checkAnswer(btn,isCorrect,correctText,fact){
  if(answered)return;
  answered=true; total++; qIdx++;
  if(isCorrect){ btn.classList.add('correct'); correct++; streak++; gCorrect++; gStreak++; }
  else{
    btn.classList.add('wrong'); streak=0; gStreak=0;
    document.querySelectorAll('.opt').forEach(b=>{
      if(parseInt(b.dataset.orig)===curQ[2]) b.classList.add('correct');
    });
  }
  gTotal++;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);

  const fbArea=document.getElementById('fb-area');
  const fb=document.createElement('div');
  fb.className='fb '+(isCorrect?'good':'bad');
  fb.innerHTML=`<span>${isCorrect?'✓':'✗'}</span>${isCorrect?'Correct! Great work.':'Not quite — the answer was <strong>'+correctText+'</strong>'}`;
  fbArea.appendChild(fb);

  const factBox=document.createElement('div');
  factBox.className='fact-box';
  factBox.innerHTML=`<span class="fact-icon">💡</span><span>${fact}</span>`;
  fbArea.appendChild(factBox);

  const pct=Math.round((qIdx/queue.length)*100);
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('prog-lbl').textContent=`${qIdx}/${queue.length}`;
  document.getElementById('nxt').style.display='flex';
  updateGlobalStats();
}

function advance(){
  renderQ();
}

/* ════════════════════════════════════════
   END
════════════════════════════════════════ */
function showEnd(){
  const s=curSubj;
  const pct=Math.round((correct/queue.length)*100);
  const msgs=[
    "Keep exploring — every question teaches you something! 📚",
    "Good effort! You're building a great knowledge base. 🌍",
    "Solid performance — well done! 🎯",
    "Excellent work! You really know your stuff. ⭐",
    "Perfect score! You're a true MindVault champion! 🏆"
  ];
  const mi=pct>=95?4:pct>=75?3:pct>=55?2:pct>=35?1:0;

  document.getElementById('quiz-inner').innerHTML=`
    <div class="end-wrap">
      <div class="end-icon">${s.icon}</div>
      <div class="end-pct" style="color:${s.color}">${pct}%</div>
      <div class="end-lbl">${correct} of ${queue.length} correct · ${s.name}</div>
      <div class="end-msg">${msgs[mi]}</div>
      <div class="end-grid">
        <div class="end-stat"><div class="end-val">${correct}</div><div class="end-key">Correct</div></div>
        <div class="end-stat"><div class="end-val">${queue.length-correct}</div><div class="end-key">Missed</div></div>
        <div class="end-stat"><div class="end-val">${pct}%</div><div class="end-key">Score</div></div>
        <div class="end-stat"><div class="end-val">${gCorrect}</div><div class="end-key">All-time ✓</div></div>
      </div>
      <div class="btn-row">
        <button class="play-again" style="background:${s.color}" onclick="startSubject('${s.id}')">Play Again ↺</button>
        <button class="home-btn" onclick="buildHome()">All Subjects</button>
      </div>
    </div>`;
}

/* ════════════════════════════════════════
   KEYBOARD
════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  const map={'1':0,'2':1,'3':2,'4':3};
  if(map[e.key]!==undefined&&!answered){
    const btns=document.querySelectorAll('.opt');
    if(btns[map[e.key]])btns[map[e.key]].click();
  }
  if(e.key==='Enter'&&answered){
    const nxt=document.getElementById('nxt');
    if(nxt&&nxt.style.display!=='none')advance();
  }
});

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
buildHome();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./mindvault-sw.js')
      .catch(err => console.log('SW registration failed:', err));
  });
}
</script>
</body>
</html>
