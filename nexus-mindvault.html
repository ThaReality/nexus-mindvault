<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus MindVault — Junior Trivia</title>
<meta name="description" content="Junior trivia app — 310 questions across 9 subjects. Science, History, Space and more. By Verus5417.">
<meta name="theme-color" content="#ff3c5f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MindVault">
<link rel="manifest" href="mindvault-manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Familjen+Grotesk:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090f;--s1:#0f1018;--s2:#161722;--s3:#1d1e2e;
  --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.12);--b3:rgba(255,255,255,0.2);
  --txt:#eeeef5;--muted:#6e6e8a;--hint:#9999bb;
  /* subject colours */
  --science:#00d4aa;--history:#f5a623;--space:#7b8cde;
  --famous:#e8609a;--sports:#4ade80;--food:#fb923c;
  --maths:#a78bfa;--language:#38bdf8;--oceans:#06b6d4;
  --nexus:#ff3c5f;
  --ok-bg:rgba(0,212,170,0.12);--ok-b:rgba(0,212,170,0.35);--ok-t:#00d4aa;
  --er-bg:rgba(255,60,95,0.12);--er-b:rgba(255,60,95,0.35);--er-t:#ff6b87;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Familjen Grotesk',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}

/* grid bg */
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 20%,rgba(123,140,222,0.06) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(0,212,170,0.05) 0%,transparent 50%);pointer-events:none;z-index:0}

.wrap{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:2rem 1.25rem 5rem}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:2.5rem;flex-wrap:wrap;gap:1rem}
.brand{display:flex;align-items:center;gap:12px}
.brand-badge{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--nexus),#ff8c69);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.brand-name{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.brand-nexus{color:var(--nexus)}
.brand-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.6px;margin-top:1px}
.hdr-stats{display:flex;gap:8px;flex-wrap:wrap}
.spill{background:var(--s1);border:1px solid var(--b1);border-radius:100px;padding:6px 14px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.spill strong{color:var(--txt);font-size:13px}
.spill.s-streak strong{color:#fbbf24}
.spill.s-score strong{color:var(--science)}

/* ── HOME SCREEN ── */
.home-title{font-size:32px;font-weight:700;letter-spacing:-1px;margin-bottom:.4rem;line-height:1.1}
.home-title em{font-style:normal;color:var(--nexus)}
.home-sub{font-size:15px;color:var(--hint);margin-bottom:2rem;font-family:'DM Mono',monospace}
.subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:2rem}
.subj-card{background:var(--s1);border:1px solid var(--b1);border-radius:18px;padding:1.25rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.subj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--c);border-radius:18px 18px 0 0;opacity:.8}
.subj-card:hover{border-color:var(--b2);transform:translateY(-2px);background:var(--s2)}
.subj-card:hover .subj-icon{transform:scale(1.15)}
.subj-icon{font-size:32px;margin-bottom:.75rem;display:block;transition:transform .2s}
.subj-name{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:.3rem}
.subj-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.subj-card .subj-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--c);margin-right:5px}
.diff-bar{display:flex;gap:3px;margin-top:.6rem}
.diff-pip{width:16px;height:4px;border-radius:2px;background:var(--b2)}
.diff-pip.on{background:var(--c)}

/* ── QUIZ SCREEN ── */
.quiz-wrap{animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.quiz-header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap}
.back-btn{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:8px 14px;font-family:'Familjen Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.back-btn:hover{color:var(--txt);border-color:var(--b2)}
.quiz-subject-pill{background:var(--s2);border:1px solid var(--b1);border-radius:100px;padding:6px 14px;font-size:12px;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.qsp-dot{width:8px;height:8px;border-radius:50%;background:var(--c)}

.progress-row{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem}
.prog-track{flex:1;height:4px;background:var(--s2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--c);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.prog-lbl{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);min-width:44px;text-align:right}

/* question card */
.q-card{background:var(--s1);border:1px solid var(--b1);border-radius:22px;padding:2.25rem 2rem;margin-bottom:1rem;position:relative;overflow:hidden}
.q-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--c)}
.q-badge{display:inline-flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:5px 12px;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--hint);margin-bottom:1.25rem;letter-spacing:.3px}
.q-num{color:var(--c);font-weight:700}
.q-text{font-size:22px;font-weight:700;line-height:1.35;letter-spacing:-.3px}
.q-context{font-size:13px;color:var(--muted);margin-top:.5rem;font-family:'DM Mono',monospace}

/* options */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
@media(max-width:480px){.opts{grid-template-columns:1fr}}
.opt{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:15px 14px;font-family:'Familjen Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--txt);cursor:pointer;text-align:left;transition:all .18s;display:flex;align-items:center;gap:10px;line-height:1.3}
.opt:hover:not(:disabled){background:var(--s2);border-color:var(--b2);transform:translateY(-1px)}
.opt-ltr{width:28px;height:28px;border-radius:8px;background:var(--s2);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);flex-shrink:0;transition:all .18s}
.opt:hover:not(:disabled) .opt-ltr{background:color-mix(in srgb,var(--c) 20%,transparent);border-color:color-mix(in srgb,var(--c) 40%,transparent);color:var(--c)}
.opt.correct{background:var(--ok-bg);border-color:var(--ok-b);color:var(--ok-t)}
.opt.correct .opt-ltr{background:rgba(0,212,170,.2);border-color:rgba(0,212,170,.4);color:var(--ok-t)}
.opt.wrong{background:var(--er-bg);border-color:var(--er-b);color:var(--er-t)}
.opt.wrong .opt-ltr{background:rgba(255,60,95,.2);border-color:rgba(255,60,95,.4);color:var(--er-t)}
.opt:disabled{cursor:default;transform:none}

/* fact box */
.fact-box{background:var(--s2);border:1px solid var(--b1);border-radius:14px;padding:14px 18px;margin-bottom:1rem;font-size:14px;color:var(--hint);line-height:1.6;animation:slideIn .25s ease;display:flex;gap:10px;align-items:flex-start}
.fact-icon{font-size:18px;flex-shrink:0;margin-top:1px}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* feedback */
.fb{padding:12px 16px;border-radius:12px;font-size:14px;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;gap:8px;animation:slideIn .2s ease}
.fb.good{background:var(--ok-bg);border:1px solid var(--ok-b);color:var(--ok-t)}
.fb.bad{background:var(--er-bg);border:1px solid var(--er-b);color:var(--er-t)}

/* next btn */
.next-btn{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:14px;padding:15px;font-family:'Familjen Grotesk',sans-serif;font-size:15px;font-weight:700;color:var(--txt);cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px}
.next-btn:hover{background:color-mix(in srgb,var(--c) 15%,transparent);border-color:color-mix(in srgb,var(--c) 40%,transparent);color:var(--c)}

/* end screen */
.end-wrap{text-align:center;padding:2.5rem 1.5rem;animation:fadeUp .4s ease}
.end-icon{font-size:64px;margin-bottom:1rem;animation:bounce .6s ease}
@keyframes bounce{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.end-pct{font-size:80px;font-weight:700;letter-spacing:-3px;line-height:1;margin-bottom:.25rem;color:var(--c)}
.end-lbl{font-family:'DM Mono',monospace;font-size:13px;color:var(--muted);margin-bottom:.5rem}
.end-msg{font-size:18px;font-weight:700;margin-bottom:2rem}
.end-grid{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:2rem}
.end-stat{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px 22px;text-align:center;min-width:90px}
.end-val{font-size:26px;font-weight:700;font-family:'DM Mono',monospace}
.end-key{font-size:11px;color:var(--muted);margin-top:2px;font-family:'DM Mono',monospace}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.play-again{background:var(--c);border:none;border-radius:14px;padding:14px 32px;font-family:'Familjen Grotesk',sans-serif;font-size:15px;font-weight:700;color:#fff;cursor:pointer;transition:all .18s}
.play-again:hover{opacity:.9;transform:translateY(-2px)}
.home-btn{background:var(--s2);border:1px solid var(--b2);border-radius:14px;padding:14px 24px;font-family:'Familjen Grotesk',sans-serif;font-size:15px;font-weight:700;color:var(--txt);cursor:pointer;transition:all .18s}
.home-btn:hover{border-color:var(--b3);background:var(--s3)}

/* kb hint */
.kb{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-align:center;margin-top:1rem}
.kb kbd{background:var(--s2);border:1px solid var(--b2);border-radius:4px;padding:2px 6px;font-size:10px}

/* footer */
.footer{text-align:center;margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--b1)}
.footer p{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.fnx{color:var(--nexus);font-weight:700}
.fby{color:var(--science);font-weight:700}

/* count info */
.c-info{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:1rem;text-align:center}

/* screen mgmt */
#screen-home,#screen-quiz{display:none}
#screen-home.active,#screen-quiz.active{display:block}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER (always visible) -->
  <div class="hdr">
    <div class="brand">
      <div class="brand-badge">🧠</div>
      <div>
        <div class="brand-name"><span class="brand-nexus">NEXUS</span> MindVault</div>
        <div class="brand-sub">by Verus5417</div>
      </div>
    </div>
    <div class="hdr-stats">
      <div class="spill s-score">✓ <strong id="g-correct">0</strong></div>
      <div class="spill">/ <strong id="g-total">0</strong></div>
      <div class="spill s-streak">🔥 <strong id="g-streak">0</strong></div>
    </div>
  </div>

  <!-- HOME SCREEN -->
  <div id="screen-home">
    <div class="home-title">What do you <em>know</em>?</div>
    <div class="home-sub">Pick a subject · 310 questions total · beat your streak</div>
    <div class="subject-grid" id="subject-grid"></div>
    <div class="footer"><p><span class="fnx">NEXUS</span> MindVault · Created by <span class="fby">Verus5417</span></p></div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="screen-quiz">
    <div class="quiz-wrap" id="quiz-inner"></div>
    <div class="kb" id="kb-hint">Press <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> <kbd>4</kbd> to answer · <kbd>Enter</kbd> for next</div>
    <div class="footer"><p><span class="fnx">NEXUS</span> MindVault · Created by <span class="fby">Verus5417</span></p></div>
  </div>

</div>

<script>
/* ════════════════════════════════════════
   SUBJECTS DEFINITION
════════════════════════════════════════ */
const SUBJECTS = [
  { id:'science',  name:'Science & Nature',   icon:'🔬', color:'var(--science)',  diff:2, desc:'35 questions · animals · body · extremes' },
  { id:'history',  name:'History',             icon:'🏛️', color:'var(--history)',  diff:3, desc:'35 questions · ancient worlds · explorers · empires' },
  { id:'space',    name:'Space & Astronomy',   icon:'🚀', color:'var(--space)',    diff:2, desc:'35 questions · planets · stars · space missions' },
  { id:'famous',   name:'Famous People',       icon:'⭐', color:'var(--famous)',   diff:2, desc:'34 questions · scientists · leaders · trailblazers' },
  { id:'sports',   name:'Sports & Records',    icon:'🏆', color:'var(--sports)',   diff:1, desc:'34 questions · world records · Olympics · origins' },
  { id:'food',     name:'Food & Culture',      icon:'🍜', color:'var(--food)',     diff:1, desc:'34 questions · origins · festivals · traditions' },
  { id:'maths',    name:'Maths Curiosities',   icon:'∞',  color:'var(--maths)',    diff:3, desc:'34 questions · patterns · puzzles · wow facts' },
  { id:'language', name:'Language & Words',    icon:'💬', color:'var(--language)', diff:2, desc:'34 questions · etymology · writing · linguistics' },
  { id:'oceans',   name:'Oceans & Geography',  icon:'🌊', color:'var(--oceans)',   diff:2, desc:'35 questions · rivers · mountains · deserts · seas' },
];

/* ════════════════════════════════════════
   QUESTION BANK  [question, [A,B,C,D], correct_index, fun_fact]
════════════════════════════════════════ */
const QB = {

science:[
  ["What is the fastest land animal on Earth?",["Cheetah","Lion","Springbok","Greyhound"],0,"A cheetah can reach speeds up to 120 km/h — but only in short bursts before it overheats. It needs about 30 minutes to cool down after a chase!"],
  ["How many bones does an adult human body have?",["206","182","250","300"],0,"Babies are born with around 270–300 bones. As we grow, many fuse together, leaving us with 206 by adulthood — the fusion is complete by around age 25."],
  ["What is the largest living animal on Earth?",["Blue Whale","African Elephant","Whale Shark","Giant Squid"],0,"The blue whale's heart is the size of a small car and its heartbeat can be heard from 3 km away. Its tongue alone can weigh as much as an elephant!"],
  ["Which organ pumps blood around the human body?",["Heart","Liver","Lungs","Kidney"],0,"Your heart beats around 100,000 times every single day — that's over 35 million beats a year, pumping about 2,000 gallons of blood daily."],
  ["What gas do plants absorb from the air to make food?",["Carbon dioxide","Oxygen","Nitrogen","Hydrogen"],0,"Plants convert CO₂ and sunlight into glucose via photosynthesis — essentially they eat light. One large tree can absorb about 21 kg of CO₂ per year."],
  ["What is the deepest point in the world's oceans?",["Mariana Trench","Puerto Rico Trench","Java Trench","Tonga Trench"],0,"The Mariana Trench reaches nearly 11,000 metres deep. If Mount Everest were placed in it, the summit would still be over a mile underwater."],
  ["How many hearts does an octopus have?",["3","1","2","4"],0,"Octopuses have three hearts: two pump blood to the gills, one pumps it to the body. Their blood is blue because it uses copper-based haemocyanin instead of iron-based haemoglobin."],
  ["Which animal has the longest confirmed lifespan?",["Ocean Quahog Clam","Greenland Shark","Giant Tortoise","Bowhead Whale"],0,"An ocean quahog clam named Ming was found to be 507 years old — it was alive during the reign of Henry VIII and the birth of the Renaissance!"],
  ["What is the smallest bone in the human body?",["Stapes (in the ear)","Coccyx","Patella","Phalanx"],0,"The stapes is just 3mm long. Together with two other tiny bones, it transmits sound vibrations from the eardrum to the inner ear. Without it, we'd be deaf."],
  ["What do you call an animal that eats both plants and meat?",["Omnivore","Carnivore","Herbivore","Decomposer"],0,"Humans are omnivores! Bears, pigs, crows, and raccoons are too. Being an omnivore is a huge evolutionary advantage — it means you can survive on whatever is available."],
  ["What is the most abundant gas in Earth's atmosphere?",["Nitrogen","Oxygen","Carbon dioxide","Argon"],0,"Nitrogen makes up 78% of air. Oxygen is only 21%. The remaining 1% is mostly argon plus trace amounts of CO₂, neon, helium, and other gases."],
  ["What covers about 71% of Earth's surface?",["Water","Land","Ice","Forests"],0,"Despite covering most of the planet, over 96% of Earth's water is in the salty oceans. Only about 2.5% is fresh water, and most of that is locked in ice."],
  ["Which animal can regrow its limbs if they are cut off?",["Starfish","Shark","Eagle","Crocodile"],0,"Starfish (sea stars) can regrow lost arms — and in some species, the severed arm can even regrow an entirely new body! Axolotls can also regrow limbs, heart, and brain tissue."],
  ["What is the hardest natural substance on Earth?",["Diamond","Quartz","Titanium","Obsidian"],0,"Diamonds are made of carbon atoms in a crystal lattice structure. They form 160 km underground under extreme heat and pressure, then travel up via volcanic eruptions."],
  ["What is the process by which caterpillars become butterflies called?",["Metamorphosis","Photosynthesis","Hibernation","Migration"],0,"Inside the chrysalis, the caterpillar dissolves into a soup of cells that reorganise into a butterfly. It essentially digests itself and rebuilds — one of nature's most extraordinary transformations."],
  ["Which sense do sharks primarily use to detect prey from far away?",["Smell","Sight","Touch","Taste"],0,"Sharks can detect one drop of blood in 100 litres of water and smell prey from up to 400 metres away. They also have a sixth sense — electroreception — detecting electrical fields from living creatures."],
  ["What is the powerhouse of the cell?",["Mitochondria","Nucleus","Ribosome","Cell membrane"],0,"Mitochondria convert oxygen and nutrients into ATP — the cell's energy currency. They have their own DNA, suggesting they were once free-living bacteria absorbed into cells billions of years ago."],
  ["How many chambers does a human heart have?",["4","2","3","6"],0,"The four chambers are: left and right atria (upper), and left and right ventricles (lower). The left ventricle is the most muscular because it pumps blood to the entire body."],
  ["Which planet in our solar system rotates the fastest?",["Jupiter","Saturn","Earth","Mars"],0,"Jupiter completes a full rotation in just under 10 hours despite being the largest planet. This rapid spin causes it to bulge at the equator and flatten at the poles."],
  ["What is bioluminescence?",["Light produced by living organisms","Colour change in animals","Animal camouflage","Extreme cold tolerance"],0,"Bioluminescence is used by deep-sea fish, fireflies, jellyfish, and some fungi. About 76% of deep-sea animals produce their own light — in the darkness of the deep ocean, it's a critical survival tool."],
  ["How long does it take for the Earth to orbit the Sun?",["365.25 days","360 days","400 days","300 days"],0,"That extra 0.25 day is why we have a leap year every four years, adding an extra day in February. Without this correction, our calendar would drift by 24 days every century."],
  ["Which organ is responsible for filtering blood in the human body?",["Kidneys","Liver","Spleen","Pancreas"],0,"Your kidneys filter about 200 litres of blood every day, producing 1–2 litres of urine. They also regulate blood pressure, red blood cell production, and calcium levels."],
  ["What is the name of the largest bone in the human body?",["Femur","Tibia","Humerus","Radius"],0,"The femur (thigh bone) is not only the longest bone but also the strongest — it can support 30 times the weight of an adult human body."],
  ["Which animal has the largest brain relative to its body size?",["Sperm Whale","Elephant","Dolphin","Chimpanzee"],0,"Sperm whales have the largest brain of any animal by absolute size — about 8 kg. But relative to body size, dolphins have some of the most complex brains, with intelligence comparable to great apes."],
  ["What is the name of the layer of the atmosphere where weather occurs?",["Troposphere","Stratosphere","Mesosphere","Thermosphere"],0,"The troposphere extends about 12 km above Earth's surface and contains 75% of the atmosphere's mass. Above it is the stratosphere, where the ozone layer absorbs harmful UV radiation."],
  ["What type of animal is a salamander?",["Amphibian","Reptile","Fish","Mammal"],0,"Salamanders can breathe through their skin — some species have no lungs at all! The axolotl, a type of salamander from Mexico, can regenerate entire organs including its brain."],
  ["What is the speed of light?",["299,792 km per second","150,000 km per second","100,000 km per second","1 million km per second"],0,"Nothing in the universe travels faster than light. At this speed, light can circle the Earth more than 7 times in a single second."],
  ["What is the name of the thick fluid that cushions your joints?",["Synovial fluid","Plasma","Lymph","Cerebrospinal fluid"],0,"Synovial fluid is found in joints like your knees and elbows. It acts like oil in an engine — reducing friction and delivering nutrients to cartilage, which has no blood supply of its own."],
  ["Which is the only mammal capable of true flight?",["Bat","Flying squirrel","Sugar glider","Colugo"],0,"Flying squirrels and sugar gliders glide, but only bats truly fly. There are over 1,400 bat species — they make up about 20% of all mammal species and are crucial pollinators and insect controllers."],
  ["What is the approximate temperature at the surface of the Sun?",["5,500°C","1,000°C","10,000°C","500°C"],0,"The Sun's surface is 5,500°C, but its outer atmosphere (the corona) bizarrely reaches over 1,000,000°C — why the corona is hotter than the surface remains one of solar physics' great mysteries."],
  ["What causes the northern lights (Aurora Borealis)?",["Solar particles hitting Earth's atmosphere","Moonlight reflecting off ice","Volcanic gases rising high","Sunlight bending over the horizon"],0,"Charged particles from the Sun travel along Earth's magnetic field lines and collide with gas particles in the atmosphere, releasing energy as light. The colours depend on which gases are hit — oxygen gives green and red, nitrogen gives blue and purple."],
  ["What is the name of the process plants use to release oxygen?",["Photosynthesis","Respiration","Transpiration","Osmosis"],0,"During photosynthesis, plants absorb CO₂ and release O₂ as a byproduct. All the oxygen in Earth's atmosphere was produced by photosynthetic organisms — originally ancient cyanobacteria — over billions of years."],
  ["Which blood type is known as the universal donor?",["O negative","AB positive","A positive","B negative"],0,"O negative red blood cells can be given to patients of any blood type in emergencies. AB positive is the universal plasma donor. Only about 7% of people have O negative blood."],
  ["What is the world's largest reptile?",["Saltwater Crocodile","Komodo Dragon","Leatherback Turtle","Nile Crocodile"],0,"Saltwater crocodiles can grow over 6 metres long and weigh more than 1,000 kg. They've barely changed in 200 million years and have survived five mass extinction events."],
  ["What is Newton's First Law of Motion?",["An object in motion stays in motion unless acted upon by a force","For every action there is an equal and opposite reaction","Force equals mass times acceleration","Energy cannot be created or destroyed"],0,"This is also called the Law of Inertia. It explains why you lurch forward when a car brakes suddenly — your body was in motion and wants to stay in motion!"],
],

history:[
  ["Which ancient wonder was located in Alexandria, Egypt?",["The Lighthouse","The Colosseum","The Parthenon","The Sphinx"],0,"The Lighthouse of Alexandria stood over 100 metres tall — one of the tallest man-made structures in the ancient world for nearly 1,500 years. It guided ships until it collapsed in the 14th century."],
  ["Who was the first European to reach the Americas in 1492?",["Christopher Columbus","Leif Eriksson","John Cabot","Amerigo Vespucci"],0,"Columbus landed in the Bahamas thinking he'd reached Asia. Leif Eriksson actually reached North America 500 years earlier, but it was Columbus's voyage that changed world history permanently."],
  ["Which African empire was one of the wealthiest in all of history?",["Mali Empire","Roman Empire","Ottoman Empire","British Empire"],0,"Mansa Musa of the Mali Empire is considered the richest person in recorded history. His pilgrimage to Mecca in 1324 — with 60,000 men and 80 camels each carrying 140 kg of gold — crashed North African gold prices for a decade."],
  ["In which year did World War II end?",["1945","1944","1946","1943"],0,"WWII ended in May 1945 in Europe (VE Day) and September 1945 in the Pacific after Japan's surrender following the atomic bombings of Hiroshima and Nagasaki."],
  ["What was the Egyptian queen famous for her intelligence and alliances with Rome?",["Cleopatra","Nefertiti","Hatshepsut","Isis"],0,"Cleopatra VII spoke nine languages and was the first Ptolemaic ruler to actually learn Egyptian. Her dynasty had ruled Egypt for 300 years but always spoke Greek — she broke that tradition."],
  ["Which civilisation built Machu Picchu?",["Inca","Aztec","Maya","Olmec"],0,"The Inca built Machu Picchu around 1450 CE. The stones fit so precisely that no mortar was needed — not even a piece of paper can be slipped between them. The site was unknown to the outside world until 1911."],
  ["What document signed in 1215 limited the king's power in England?",["Magna Carta","Bill of Rights","Domesday Book","Act of Union"],0,"The Magna Carta established for the first time that even the king was subject to the law. It directly influenced the US Constitution, the Universal Declaration of Human Rights, and most modern democracies."],
  ["Which ancient civilisation invented the earliest writing system?",["Sumerians","Egyptians","Greeks","Chinese"],0,"The Sumerians of Mesopotamia (modern Iraq) developed cuneiform script around 3200 BCE — pressed into clay tablets with a reed stylus. It began as a record-keeping system for grain and livestock."],
  ["Who led the Indian independence movement through non-violent protest?",["Mahatma Gandhi","Jawaharlal Nehru","Subhas Chandra Bose","Bhimrao Ambedkar"],0,"Gandhi's philosophy of Satyagraha (truth-force) inspired civil rights movements globally, including Martin Luther King Jr. in the USA and Nelson Mandela in South Africa."],
  ["The Great Wall of China was built primarily to defend against whom?",["Northern nomadic tribes","Japanese forces","Mongol traders","Persian invaders"],0,"The Great Wall stretches over 21,000 km total. Millions of workers built it over centuries — many workers who died were buried within the wall itself, earning it the grim nickname 'the world's longest cemetery.'"],
  ["In which city was Nelson Mandela imprisoned for 27 years?",["Cape Town","Johannesburg","Robben Island","Pretoria"],0,"Mandela was held on Robben Island, 7 km off Cape Town. He broke rocks in a limestone quarry daily. The damage to his eyes from the glare was permanent. He was released in 1990 and became president in 1994."],
  ["What was the name of the first successful powered aeroplane?",["Wright Flyer","Spirit of St. Louis","Concorde","Sopwith Camel"],0,"Orville Wright made the first powered flight on 17 December 1903. It lasted 12 seconds and covered 37 metres — shorter than the wingspan of a modern Boeing 747."],
  ["Which empress effectively ruled China for nearly 50 years in the late 1800s?",["Empress Dowager Cixi","Wu Zetian","Lady Murasaki","Queen Himiko"],0,"Cixi rose from a low-ranking concubine to rule the world's largest empire for nearly five decades. She modernised China's military and infrastructure while maintaining absolute control over the Qing court."],
  ["The ancient city of Timbuktu was famous as a centre of what?",["Learning and scholarship","Gold trade only","Military conquest","Pyramid building"],0,"Timbuktu's Sankore University had over 25,000 students in the 1400s and held 700,000 manuscripts. It was one of the world's greatest intellectual centres, attracting scholars from across Africa, Arabia, and Europe."],
  ["Who was the first woman to win a Nobel Prize?",["Marie Curie","Florence Nightingale","Rosalind Franklin","Lise Meitner"],0,"Marie Curie won two Nobel Prizes — Physics (1903) and Chemistry (1911) — becoming the first person to win in two different sciences. She remains the only person to have done so."],
  ["Which civilisation built the Colosseum in Rome?",["Romans","Greeks","Byzantines","Etruscans"],0,"The Colosseum was completed in 80 CE and could hold 50,000–80,000 spectators. It had a retractable awning system, underground tunnels for animals and gladiators, and could be flooded for mock naval battles."],
  ["What was the name of the slave who led a major uprising against Rome in 73 BCE?",["Spartacus","Hannibal","Vercingetorix","Boudicca"],0,"Spartacus led an army of up to 120,000 escaped slaves in a rebellion that lasted two years and terrified Rome. After their defeat, 6,000 survivors were crucified along the Appian Way as a warning."],
  ["Which country first granted women the right to vote nationally?",["New Zealand","Australia","UK","USA"],0,"New Zealand granted women the right to vote in 1893, making it the first self-governing country to do so. The USA didn't grant universal women's suffrage until 1920, and Switzerland waited until 1971."],
  ["What was the Silk Road?",["A network of ancient trade routes connecting East and West","A Chinese road paved with silk","A route for silk merchants in Europe","A royal road in ancient Persia"],0,"The Silk Road wasn't a single road but a web of routes spanning 6,400 km, carrying silk, spices, ideas, religions, and disease (including the Black Death) between Asia, Africa, and Europe for over 1,500 years."],
  ["Who was the first pharaoh to unite Upper and Lower Egypt?",["Narmer (Menes)","Ramesses II","Tutankhamun","Cleopatra"],0,"Narmer united Egypt around 3100 BCE, creating one of the world's first nation-states. The double crown of Egypt — combining the white crown of Upper Egypt and red crown of Lower Egypt — symbolised this unification."],
  ["What ancient structure in Athens was dedicated to the goddess Athena?",["The Parthenon","The Pantheon","The Acropolis","The Forum"],0,"The Parthenon was built between 447–432 BCE. Its columns are slightly curved — the architects built in subtle optical illusions to make straight lines appear straight to the human eye. It's a masterpiece of engineering."],
  ["Which ocean did Ferdinand Magellan's expedition first cross, completing the circumnavigation of Earth?",["Pacific","Atlantic","Indian","Arctic"],0,"Magellan named the Pacific ('peaceful sea') because it seemed calmer than the Atlantic. He was killed in the Philippines in 1521 but his fleet completed the journey — the first circumnavigation of Earth took three years."],
  ["What was the name of the empire that Genghis Khan founded?",["Mongol Empire","Ottoman Empire","Mughal Empire","Han Empire"],0,"The Mongol Empire became the largest contiguous land empire in history, covering 24 million km² and 25% of the world's land. At its height, it connected Europe to China in a single political entity."],
  ["Which African queen led resistance against Roman expansion in North Africa?",["Queen Dido of Carthage","Cleopatra of Egypt","Queen Nzinga of Angola","Yaa Asantewaa of Ashanti"],0,"Queen Dido (also called Elissa) founded Carthage around 814 BCE. Carthage became Rome's greatest rival. Hannibal, who famously crossed the Alps with war elephants to attack Rome, was Carthaginian."],
  ["In which year did the Berlin Wall fall, reuniting East and West Germany?",["1989","1991","1987","1993"],0,"The Berlin Wall fell on 9 November 1989. It had stood since 1961, dividing the city for 28 years. Over 140 people were killed trying to cross it. Its fall marked the effective end of the Cold War."],
  ["What was the name of the ancient trade hub city that sat at the crossroads of Africa, Arabia, and India?",["Kilwa Kisiwani","Timbuktu","Carthage","Alexandria"],0,"Kilwa Kisiwani (in modern Tanzania) was one of the wealthiest cities in the world in the 14th century, described by Ibn Battuta as one of the most beautiful cities in the world. It grew rich trading gold, ivory, and enslaved people."],
  ["Who was the first emperor of a unified China?",["Qin Shi Huang","Han Wudi","Tang Taizong","Kublai Khan"],0,"Qin Shi Huang unified China in 221 BCE, standardised weights, measures, and writing, and began the Great Wall. He was also obsessed with immortality and was buried with 8,000 terracotta warriors to guard him in the afterlife."],
  ["What event in 1066 fundamentally changed the English language and culture?",["The Norman Conquest","The Viking Raids","The Black Death","Magna Carta"],0,"William the Conqueror's invasion introduced French as the language of the English court. This is why English has so many pairs of similar words — one Anglo-Saxon (cow, pig, sheep) and one French (beef, pork, mutton)."],
  ["Which ancient Greek city-state was famous for its warrior culture?",["Sparta","Athens","Corinth","Thebes"],0,"Spartan boys began military training at age 7. The legendary 300 Spartans who held the pass at Thermopylae against a Persian army of perhaps 100,000+ inspired military courage across the centuries."],
  ["What was the Transatlantic Slave Trade?",["The forced transportation of Africans to the Americas","A trading route for spices","A route for European goods to Africa","A system of indentured labour in Asia"],0,"Between 1500–1900, approximately 12.5 million Africans were enslaved and transported to the Americas. About 1.8 million died during the Middle Passage. It was the largest forced migration in human history and shaped every aspect of the modern world."],
  ["Which Indian empire under Ashoka was known for its commitment to non-violence and Buddhism?",["Maurya Empire","Gupta Empire","Mughal Empire","Chola Empire"],0,"After the brutal Battle of Kalinga (261 BCE), in which 100,000 people died, Emperor Ashoka was so horrified he converted to Buddhism and spent the rest of his reign promoting non-violence, religious tolerance, and welfare."],
  ["What ancient wonder stood at the entrance to the harbour of Rhodes?",["The Colossus of Rhodes","The Lighthouse of Alexandria","The Hanging Gardens","The Temple of Artemis"],0,"The Colossus of Rhodes was a 33-metre-tall bronze statue of the sun god Helios, built around 280 BCE. It stood for only 54 years before being toppled by an earthquake — but inspired the design of the Statue of Liberty."],
  ["Which world war began with the assassination of Archduke Franz Ferdinand in 1914?",["World War I","World War II","The Crimean War","The Boer War"],0,"The assassination in Sarajevo triggered a complex web of alliances that drew almost every major European power into war within weeks. WWI lasted four years and killed approximately 20 million people."],
  ["Who was Yaa Asantewaa?",["An Ashanti queen who led resistance against British colonialism","An Egyptian pharaoh","A Zulu warrior queen","A Malian empress"],0,"Yaa Asantewaa led the War of the Golden Stool (1900) against the British in Ghana when Ashanti male leaders were exiled. She is one of the greatest military leaders in African history and a national hero of Ghana."],
  ["What was the Industrial Revolution?",["A period of rapid mechanisation and factory production from the 1760s","A revolution in ancient Rome","A military uprising in France","A period of agricultural reform in Asia"],0,"The Industrial Revolution began in Britain in the 1760s and transformed human society more radically than any event since agriculture. It moved populations from farms to cities and created modern capitalism, but also child labour, pollution, and vast inequality."],
],

space:[
  ["How many planets are in our Solar System?",["8","9","7","10"],0,"Pluto was reclassified as a 'dwarf planet' in 2006. The eight official planets are Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, and Neptune."],
  ["What is the name of Earth's natural satellite?",["The Moon","Phobos","Europa","Titan"],0,"The Moon is drifting away from Earth at about 3.8 cm per year. In 600 million years it will be too far away to cause total solar eclipses — so we live in a special window of cosmic history."],
  ["Which planet has the most moons in our Solar System?",["Saturn","Jupiter","Uranus","Neptune"],0,"Saturn has 145 confirmed moons. The largest, Titan, is bigger than Mercury and has a thick nitrogen atmosphere with lakes of liquid methane and ethane on its surface."],
  ["What is the closest star to Earth other than the Sun?",["Proxima Centauri","Sirius","Alpha Centauri A","Betelgeuse"],0,"Proxima Centauri is 4.24 light-years away. Even our fastest spacecraft would take tens of thousands of years to reach it. It hosts a planet, Proxima b, in its habitable zone."],
  ["In what year did humans first land on the Moon?",["1969","1968","1971","1965"],0,"Apollo 11 landed on 20 July 1969. Neil Armstrong and Buzz Aldrin spent 2 hours 31 minutes on the surface. They left retroreflectors there — scientists still bounce lasers off them today."],
  ["What keeps planets in orbit around the Sun?",["Gravity","Magnetism","Friction","Inertia"],0,"Gravity pulls planets toward the Sun while their orbital velocity keeps them moving sideways. The balance of these two forces creates a stable orbit — a natural result of Newton's laws."],
  ["Which planet is famous for its spectacular ring system?",["Saturn","Jupiter","Uranus","Neptune"],0,"Saturn's rings span 282,000 km but are only about 1 km thick. They're mostly water ice. Uranus and Neptune also have rings, but they're darker and much harder to see."],
  ["What do we call a rocky object that burns up entering Earth's atmosphere?",["Meteor","Asteroid","Comet","Meteorite"],0,"The streak of light is a meteor. If it reaches the ground, it becomes a meteorite. The object in space is a meteoroid. Earth sweeps up about 40,000 tonnes of space dust and meteorites every year."],
  ["How long does light from the Sun take to reach Earth?",["About 8 minutes","1 second","1 hour","24 hours"],0,"Light travels at 299,792 km per second. The Sun is 150 million km away, so sunlight takes 8 minutes 20 seconds to reach us. When you look at the Sun, you're seeing it as it was over 8 minutes ago."],
  ["What is the name of the galaxy we live in?",["The Milky Way","Andromeda","Triangulum","Sombrero"],0,"The Milky Way is a barred spiral galaxy containing 100–400 billion stars stretching 100,000 light-years across. Our Sun sits about 26,000 light-years from the galactic centre."],
  ["Which space telescope was launched in 1990 and revolutionised astronomy?",["Hubble","James Webb","Kepler","Spitzer"],0,"Hubble has made over 1.5 million observations and helped determine the universe's age at about 13.8 billion years. Its images — like the Pillars of Creation — changed how we see the cosmos."],
  ["What is the hottest planet in our Solar System?",["Venus","Mercury","Mars","Jupiter"],0,"Despite being further from the Sun, Venus is hotter than Mercury because its thick CO₂ atmosphere traps heat. Surface temperatures reach 465°C — hot enough to melt lead."],
  ["What is a black hole?",["An object so dense that not even light can escape its gravity","A hole in space where stars fall through","An empty region with no stars","A collapsed comet"],0,"At the centre of our Milky Way sits a supermassive black hole called Sagittarius A*, 4 million times the mass of our Sun. The first ever photograph of a black hole was taken in 2019."],
  ["What was the first artificial satellite, launched in 1957?",["Sputnik 1","Explorer 1","Vanguard","Luna 1"],0,"Sputnik 1 was launched by the Soviet Union on 4 October 1957 — the size of a beach ball. Its beeping radio signal could be detected worldwide and launched the Space Race between the USA and USSR."],
  ["Which planet rotates on its side with an axis tilted nearly 98°?",["Uranus","Neptune","Saturn","Mars"],0,"Uranus is thought to have been knocked sideways by a collision billions of years ago. Its poles experience 42 years of sunlight followed by 42 years of total darkness."],
  ["What is the name of the James Webb Space Telescope's primary mission?",["Observe the first galaxies formed after the Big Bang","Monitor Earth's climate","Track near-Earth asteroids","Study the Sun's corona"],0,"Launched in December 2021, JWST can see infrared light from galaxies formed just 300 million years after the Big Bang. It's revealing the universe's earliest structures with unprecedented clarity."],
  ["What percentage of the universe is made up of ordinary matter (stars, planets, gas)?",["About 5%","About 50%","About 25%","About 75%"],0,"About 68% of the universe is dark energy, 27% is dark matter, and only 5% is the ordinary matter that makes up everything we can see and touch. The nature of dark matter and dark energy remains one of science's greatest mysteries."],
  ["What is the name of the point of no return around a black hole?",["Event horizon","Singularity","Photon sphere","Accretion disc"],0,"Once past the event horizon, nothing — not even light — can escape. Time also behaves strangely near black holes: an observer falling in would experience time passing normally, while an outside observer would see them appear to freeze."],
  ["Which planet has the Great Red Spot?",["Jupiter","Mars","Saturn","Neptune"],0,"Jupiter's Great Red Spot is a storm that has been raging for at least 350 years. It's so large that three Earths could fit inside it, though it has been slowly shrinking over the last century."],
  ["What is a light-year?",["The distance light travels in one year","The time it takes light to reach the Moon","The speed of light","One billion kilometres"],0,"A light-year is about 9.46 trillion km. The nearest large galaxy, Andromeda, is 2.537 million light-years away — meaning we see it as it was over 2.5 million years ago."],
  ["What causes a solar eclipse?",["The Moon passes between Earth and the Sun","Earth passes between the Sun and Moon","A cloud covers the Sun","The Sun dims temporarily"],0,"A total solar eclipse occurs when the Moon perfectly blocks the Sun from Earth's perspective. The fact that the Sun and Moon appear nearly the same size in our sky is a remarkable cosmic coincidence."],
  ["What is the name of the spacecraft that first left our solar system?",["Voyager 1","Pioneer 10","New Horizons","Cassini"],0,"Voyager 1 launched in 1977 and crossed into interstellar space in 2012. It's now over 23 billion km from Earth — the most distant human-made object ever. It still communicates with NASA."],
  ["What is a nebula?",["A cloud of gas and dust in space","A type of galaxy","A dead star","A large asteroid"],0,"Nebulae are the birthplaces of stars. The Orion Nebula, visible to the naked eye, is actively forming new stars right now. Some nebulae are remnants of supernova explosions — the death of massive stars."],
  ["What is the name of Mars's largest volcano?",["Olympus Mons","Mauna Kea","Mount Everest","Vesuvius"],0,"Olympus Mons is 22 km high — nearly three times the height of Everest — and 600 km wide. It's the largest known volcano in the Solar System. Its base would cover the entire country of France."],
  ["What causes the seasons on Earth?",["Earth's tilted axis as it orbits the Sun","Earth's changing distance from the Sun","Changes in the Sun's brightness","The Moon's gravitational pull"],0,"Earth's axis is tilted at 23.5°. When the northern hemisphere tilts toward the Sun, it receives more direct sunlight — giving summer. The distance from the Sun actually changes very little and doesn't cause seasons."],
  ["Which is the smallest planet in our Solar System?",["Mercury","Mars","Pluto","Venus"],0,"Mercury is only slightly larger than Earth's Moon. It has no atmosphere to retain heat, so temperatures swing from 430°C during the day to -180°C at night — the most extreme temperature range of any planet."],
  ["What do astronomers call a star that has exploded in a massive explosion?",["Supernova","Quasar","Pulsar","Red dwarf"],0,"A supernova can briefly outshine an entire galaxy of 100 billion stars. The explosion forges heavy elements like gold, iron, and carbon — meaning the atoms in your body were forged in ancient stellar explosions."],
  ["What is the Kuiper Belt?",["A region of icy objects beyond Neptune","The asteroid belt between Mars and Jupiter","A ring of gas around Jupiter","A cloud of comets around the Solar System"],0,"The Kuiper Belt is home to dwarf planets including Pluto and Eris, and to short-period comets. The Oort Cloud, much further out, is the source of long-period comets that visit the inner Solar System."],
  ["What makes the planet Neptune appear blue?",["Methane in its atmosphere","Water covering its surface","Reflection from its rings","Blue minerals in its clouds"],0,"Methane in Neptune's atmosphere absorbs red light and reflects blue. Neptune's winds are the fastest in the Solar System — reaching 2,100 km/h — despite being the furthest planet from the Sun."],
  ["In what year was the International Space Station first inhabited?",["2000","1998","1995","2005"],0,"The ISS has been continuously inhabited since November 2000, making it the longest continuous human presence in space. It travels at 28,000 km/h, orbiting Earth 16 times per day. Astronauts see 16 sunrises every 24 hours."],
  ["What is the Big Bang theory?",["The universe began from an extremely hot dense point about 13.8 billion years ago","A massive explosion created the first stars","The Sun was created by a cosmic collision","Galaxies formed from cooling gas clouds"],0,"The Big Bang wasn't an explosion in space — it was the expansion of space itself. The universe went from a point smaller than an atom to the vast cosmos we see today. The cosmic microwave background radiation is the 'afterglow' of the Big Bang, still visible today."],
  ["What colour is the Sun?",["White","Yellow","Orange","Red"],0,"The Sun actually radiates white light — all colours of the rainbow combined. It appears yellow or orange from Earth because our atmosphere scatters shorter wavelengths (blue and violet) preferentially. From space, the Sun is white."],
  ["Which planet has the shortest day in our Solar System?",["Jupiter","Mercury","Mars","Venus"],0,"Jupiter rotates in just under 10 hours, but Venus has the longest day — 243 Earth days — and rotates backwards relative to most planets. The Sun on Venus rises in the west and sets in the east."],
  ["What is the name for the region around a star where liquid water could exist on a planet's surface?",["The habitable zone","The asteroid belt","The magnetosphere","The heliosphere"],0,"The habitable zone (or 'Goldilocks zone') is where it's not too hot or too cold for liquid water. Earth sits perfectly in the Sun's habitable zone. Scientists have found over 50 potentially habitable exoplanets so far."],
  ["What is a comet?",["A ball of ice, dust and rock that orbits the Sun","A type of asteroid","A fragment of a destroyed planet","A captured moon"],0,"When a comet approaches the Sun, solar radiation vaporises its ice, creating a glowing coma (head) and tail that can stretch millions of kilometres. Halley's Comet visits Earth's neighbourhood every 75–76 years — it'll next be visible in 2061."],
],

famous:[
  ["Which scientist developed the theory of general relativity?",["Albert Einstein","Isaac Newton","Nikola Tesla","Stephen Hawking"],0,"Einstein published general relativity in 1915, describing gravity as the curvature of space-time. In 1905, his 'miracle year', he also published four papers that transformed physics — including the famous E=mc²."],
  ["Who was the first person to walk in space?",["Alexei Leonov","Yuri Gagarin","Neil Armstrong","Ed White"],0,"Soviet cosmonaut Alexei Leonov took the first spacewalk on 18 March 1965. His spacesuit inflated so much in the vacuum of space that he nearly couldn't get back through the airlock — he had to release air to fit."],
  ["Which inventor is credited with developing the telephone?",["Alexander Graham Bell","Thomas Edison","Nikola Tesla","Guglielmo Marconi"],0,"Bell made the first telephone call on 10 March 1876. His first words were: 'Mr. Watson — come here — I want to see you.' Elisha Gray filed a patent for a similar device on the same day, just hours after Bell."],
  ["Who developed the theory of evolution by natural selection?",["Charles Darwin","Gregor Mendel","Louis Pasteur","Alfred Russel Wallace"],0,"Darwin spent 20 years developing his ideas before publishing 'On the Origin of Species' in 1859. Alfred Russel Wallace independently developed the same theory simultaneously — Darwin published partly to establish priority."],
  ["Who was the first woman to fly solo across the Atlantic Ocean?",["Amelia Earhart","Bessie Coleman","Amy Johnson","Harriet Quimby"],0,"Amelia Earhart completed her solo Atlantic crossing in May 1932 in about 15 hours. She disappeared over the Pacific in 1937 attempting to circumnavigate the globe — her fate remains one of aviation's great mysteries."],
  ["Which civil rights leader gave the 'I Have a Dream' speech?",["Martin Luther King Jr.","Malcolm X","Rosa Parks","Frederick Douglass"],0,"King delivered this speech to 250,000 people at the Lincoln Memorial on 28 August 1963. He improvised the famous 'I have a dream' section after gospel singer Mahalia Jackson called out 'Tell them about the dream!'"],
  ["Who painted the Mona Lisa?",["Leonardo da Vinci","Michelangelo","Raphael","Sandro Botticelli"],0,"Leonardo kept the Mona Lisa with him until he died in 1519. He was not just a painter but also a sculptor, architect, engineer, scientist, and inventor — his notebooks contain designs for flying machines, tanks, and solar power."],
  ["What was the name of the first man in space?",["Yuri Gagarin","Buzz Aldrin","Alan Shepard","Valentina Tereshkova"],0,"Yuri Gagarin orbited Earth once on 12 April 1961 in Vostok 1, taking 108 minutes. He became the most famous person on Earth overnight. Tragically, he died in a jet crash in 1968, aged just 34."],
  ["Who discovered penicillin, the first antibiotic?",["Alexander Fleming","Louis Pasteur","Joseph Lister","Robert Koch"],0,"Fleming discovered penicillin by accident in 1928 when mould contaminated a petri dish and killed the bacteria around it. His chance observation has since saved an estimated 200 million lives."],
  ["Who was the first Black president of South Africa?",["Nelson Mandela","Thabo Mbeki","Cyril Ramaphosa","Oliver Tambo"],0,"Mandela became president in 1994 after South Africa's first democratic election. He served one term, stepped down peacefully in 1999, and forgave his jailers — becoming one of history's greatest symbols of reconciliation."],
  ["Which mathematician is known as the 'father of geometry'?",["Euclid","Pythagoras","Archimedes","Thales"],0,"Euclid's 'Elements' (written around 300 BCE) is the second most printed book in history after the Bible. Its logical proof system formed the backbone of mathematics education for over 2,000 years."],
  ["Who was Harriet Tubman?",["An abolitionist who freed enslaved people via the Underground Railroad","A scientist who studied plants","A queen of ancient Egypt","A poet and author"],0,"Tubman escaped slavery in 1849 then returned 13 times to free approximately 70 people. She never lost a passenger. She later served as a spy, scout, and nurse for the Union Army during the American Civil War."],
  ["Who created the world's first computer program?",["Ada Lovelace","Charles Babbage","Alan Turing","Grace Hopper"],0,"Ada Lovelace wrote algorithms for Charles Babbage's Analytical Engine in the 1840s — over 100 years before modern computers existed. She also foresaw that computers could do more than just calculate numbers."],
  ["Who was Alan Turing?",["A mathematician who helped crack the Enigma code and founded computer science","A physicist who split the atom","An engineer who built the first rocket","A biologist who discovered DNA"],0,"Turing's work at Bletchley Park helped crack Nazi Germany's Enigma code, arguably shortening WWII by years. He also proposed the Turing Test for artificial intelligence. He was tragically prosecuted for his homosexuality — he was posthumously pardoned in 2013."],
  ["Who was the first African-American woman to travel to space?",["Mae Jemison","Sally Ride","Christa McAuliffe","Judith Resnik"],0,"Mae Jemison flew on the Space Shuttle Endeavour in September 1992. A doctor as well as an astronaut, she later founded a company to accelerate technology for developing countries and inspired a generation of young scientists."],
  ["Which ancient Greek philosopher was the teacher of Alexander the Great?",["Aristotle","Plato","Socrates","Pythagoras"],0,"Aristotle tutored Alexander from age 13–16. Aristotle was himself taught by Plato, who was taught by Socrates — three generations of the greatest thinkers in Western philosophy, each teaching the next."],
  ["Who was Rosa Parks?",["A civil rights activist who refused to give up her bus seat","A scientist who studied genetics","An astronaut","A novelist"],0,"On 1 December 1955 in Montgomery, Alabama, Rosa Parks refused to give her seat to a white passenger. Her arrest sparked the 381-day Montgomery Bus Boycott and energised the American civil rights movement."],
  ["Which scientist discovered the structure of DNA?",["Rosalind Franklin, Watson, and Crick","Marie Curie","Louis Pasteur","Gregor Mendel"],0,"Rosalind Franklin's X-ray photograph of DNA ('Photo 51') was the crucial evidence Watson and Crick used to determine DNA's double helix structure. She did not share the 1962 Nobel Prize — she had died in 1958 and Nobel Prizes are not awarded posthumously."],
  ["Who was Nikola Tesla?",["An inventor and engineer who developed AC electricity","An explorer who discovered Antarctica","A mathematician who invented calculus","A philosopher"],0,"Tesla's AC (alternating current) system, which powers most of the world's electricity today, won the 'War of Currents' against Edison's DC system. He also invented radio, the Tesla coil, and had visions of wireless global energy."],
  ["Which leader united the Arab tribes and founded the Islamic faith?",["Prophet Muhammad","Caliph Umar","Saladin","Avicenna"],0,"Prophet Muhammad was born in Mecca around 570 CE. Within a century of his death in 632, Islam had spread from Arabia across the Middle East, North Africa, Persia, and into parts of Europe and Asia — one of history's most rapid cultural expansions."],
  ["Who wrote 'Romeo and Juliet' and 'Hamlet'?",["William Shakespeare","Geoffrey Chaucer","Christopher Marlowe","John Milton"],0,"Shakespeare wrote 37 plays and 154 sonnets. He invented over 1,700 words still used in English today including 'bedroom', 'eyeball', 'generous', 'lonely', 'obscene', 'suspicious', and 'zany'."],
  ["Who was Cleopatra's most famous Roman ally and lover?",["Julius Caesar","Augustus Caesar","Mark Antony","Pompey"],0,"Cleopatra had political alliances with both Julius Caesar and later Mark Antony. After Antony's defeat, she died by suicide in 30 BCE rather than be paraded through Rome as a conquered queen. Her death ended 3,000 years of Egyptian pharaonic rule."],
  ["Who was Wangari Maathai?",["A Kenyan environmentalist and the first African woman to win the Nobel Peace Prize","A Nigerian author who won the Nobel Prize for Literature","A South African politician","A Ghanaian scientist"],0,"Maathai founded the Green Belt Movement in 1977, mobilising rural women to plant over 51 million trees across Africa. She won the Nobel Peace Prize in 2004, the first African woman to do so. She said: 'You cannot protect the environment unless you empower people.'"],
  ["Who was Isaac Newton?",["A mathematician and physicist who developed the laws of gravity and motion","A chemist who discovered oxygen","A philosopher who developed calculus","An astronomer who discovered Uranus"],0,"Newton developed the laws of motion and universal gravitation in the 1680s, invented calculus (at the same time as Leibniz, independently), and built the first practical reflecting telescope. He called himself 'a boy playing on the seashore' while 'the great ocean of truth lay all undiscovered before me.'"],
  ["Who was Sundiata Keita?",["The founder of the Mali Empire","An ancient Egyptian pharaoh","A Chinese emperor","A Mongol warlord"],0,"Sundiata Keita founded the Mali Empire around 1235 CE after defeating the Sosso king Sumanguru Kante at the Battle of Kirina. The Mali Empire became one of the largest and richest empires in history, and Sundiata is celebrated as a hero across West Africa to this day."],
  ["Who was Florence Nightingale?",["The founder of modern nursing","A Victorian novelist","A mathematician","A women's rights campaigner"],0,"During the Crimean War (1853–56), Nightingale used statistical analysis — including the invention of the polar area diagram — to prove that most soldiers were dying from preventable infections. She reduced the death rate from 42% to 2% through improved sanitation."],
  ["Which scientist first proposed that Earth orbits the Sun (not the other way around)?",["Nicolaus Copernicus","Galileo Galilei","Johannes Kepler","Tycho Brahe"],0,"Copernicus published his heliocentric model in 1543, the year he died. It was a revolutionary and dangerous idea — it contradicted both common sense and the Catholic Church. Galileo was later placed under house arrest for supporting it."],
  ["Who was Freddie Mercury?",["Lead vocalist of Queen, one of the greatest rock performers of all time","A classical composer","A jazz musician","A film director"],0,"Freddie Mercury was born Farrokh Bulsara in Zanzibar (now Tanzania) to Indian Parsi parents. He wrote Bohemian Rhapsody, Somebody to Love, and Don't Stop Me Now. His Live Aid performance in 1985 is widely considered the greatest rock concert moment in history."],
  ["Who was Ibn Battuta?",["A Moroccan explorer who travelled further than Marco Polo","A Persian poet","A Chinese navigator","An Arab mathematician"],0,"Ibn Battuta (1304–1368 or 1369) covered about 120,000 km over 30 years, visiting the equivalent of 44 modern countries across Africa, the Middle East, Central Asia, South Asia, Southeast Asia, and China — far more than Marco Polo."],
  ["Who was Frida Kahlo?",["A Mexican painter known for vibrant self-portraits","A Mexican poet","A Cuban musician","A Colombian sculptor"],0,"Kahlo survived a nearly fatal bus accident at 18 and spent her life in physical pain, undergoing 35 operations. She channelled her suffering into 143 paintings, 55 of which are self-portraits. She said: 'I paint myself because I am so often alone and because I am the subject I know best.'"],
  ["Which physicist is known for the thought experiment of 'Schrödinger's Cat'?",["Erwin Schrödinger","Werner Heisenberg","Niels Bohr","Max Planck"],0,"Schrödinger's Cat (1935) illustrates the paradox of quantum superposition — a cat in a sealed box with a radioactive particle is simultaneously alive AND dead until you open the box and observe it. It was meant to show how absurd quantum mechanics seems when applied to the everyday world."],
  ["Who was Mansa Musa?",["The emperor of the Mali Empire, considered history's wealthiest person","A king of ancient Egypt","A Byzantine emperor","An Ottoman sultan"],0,"Mansa Musa's net worth has been estimated at $400 billion in today's money, making him wealthier than any person in modern history. When he made his pilgrimage to Mecca in 1324, he distributed so much gold that he crashed the gold market across North Africa and the Middle East."],
  ["Who was the first woman to lead a G7 nation?",["Margaret Thatcher","Angela Merkel","Indira Gandhi","Golda Meir"],0,"Margaret Thatcher became UK Prime Minister in 1979 — the first woman to lead any G7 nation. She served three consecutive terms (1979–1990). The first female head of government globally was Sirimavo Bandaranaike of Sri Lanka in 1960."],
  ["Who invented the World Wide Web?",["Tim Berners-Lee","Bill Gates","Steve Jobs","Vint Cerf"],0,"Tim Berners-Lee invented the World Wide Web in 1989 while working at CERN in Switzerland. Crucially, he made it free and open to everyone. He received no patent royalties — a decision that enabled the entire modern internet to flourish."],
],

sports:[
  ["In which city were the first modern Olympic Games held in 1896?",["Athens","Paris","London","Rome"],0,"The 1896 Athens Games had 241 athletes from 14 nations competing in 43 events. Today, the Olympics attract over 10,000 athletes from 200+ nations competing in 30+ sports."],
  ["What sport uses a shuttlecock?",["Badminton","Tennis","Squash","Pickleball"],0,"A shuttlecock can travel at over 400 km/h in professional badminton — making it the fastest-moving object in any racket sport. The sport originated in British India in the mid-19th century."],
  ["How many players are on a standard football (soccer) team on the pitch?",["11","9","10","12"],0,"Football was formally codified by the Football Association in England in 1863. It's now the world's most popular sport, played by over 250 million people in more than 200 countries."],
  ["Who holds the record for the most Olympic gold medals ever?",["Michael Phelps","Usain Bolt","Carl Lewis","Mark Spitz"],0,"Michael Phelps won 23 Olympic gold medals across four Games. His arm span of 201 cm equals his height — giving him a swimmer's ideal proportions. He also has unusually flexible ankles that can extend further than most humans."],
  ["In which country did judo originate?",["Japan","China","Korea","Brazil"],0,"Judo was created by Jigoro Kano in 1882. The name means 'gentle way' — the principle is using an opponent's force against them. It became an Olympic sport in 1964 when the Games were held in Tokyo."],
  ["What is the world record for the 100m sprint?",["9.58 seconds","9.69 seconds","9.74 seconds","9.81 seconds"],0,"Usain Bolt set 9.58 seconds at the 2009 World Championships in Berlin. At his peak speed in that race, he was running at 44.72 km/h. He also held his arms out in celebration before crossing the finish line — and still won easily."],
  ["How many holes are there in a standard round of golf?",["18","9","12","24"],0,"The 18-hole standard was established at St Andrews, Scotland in 1858. Golf is one of only two sports played on the Moon — Alan Shepard hit a golf ball on the lunar surface during Apollo 14 in 1971."],
  ["Which country has won the most FIFA World Cups?",["Brazil","Germany","Italy","Argentina"],0,"Brazil has won the World Cup five times (1958, 1962, 1970, 1994, 2002) and is the only nation to have qualified for every World Cup since the tournament began in 1930."],
  ["In basketball, how many points is a shot from beyond the arc worth?",["3","2","1","4"],0,"The three-point line was introduced to the NBA in 1979. Today, three-point shooting has completely transformed basketball — teams now attempt far more threes than ever before as analytics proved it's more efficient."],
  ["What sport is played at Wimbledon?",["Tennis","Croquet","Polo","Squash"],0,"The Wimbledon Championships began in 1877, making it the world's oldest tennis tournament. Players are still required to wear predominantly white clothing — a tradition dating back to Victorian times."],
  ["Which country invented cricket?",["England","India","Australia","South Africa"],0,"Cricket evolved in England in the 16th century. The first recorded match was in 1646. Today India has the world's largest cricketing fanbase, with billions of fans watching international matches."],
  ["How long is a marathon race?",["42.195 km","40 km","50 km","26 km"],0,"The marathon distance was standardised in 1908 at the London Olympics when the race was extended so it could start at Windsor Castle and finish in front of the royal box — adding the precise extra distance that gave us the odd 195 metres."],
  ["What does LBW stand for in cricket?",["Leg Before Wicket","Left Bowled Wide","Low Bat Warning","Lateral Back Wicket"],0,"LBW is one of cricket's most debated dismissals. The bowler must appeal ('Howzat?') before an umpire can give the batsman out. The introduction of ball-tracking technology has dramatically changed how LBW decisions are reviewed."],
  ["What is a 'hat-trick' in football?",["Three goals scored by one player in one game","Three penalties in a match","Winning three consecutive games","Scoring in three different positions"],0,"The term 'hat-trick' comes from cricket, where a bowler who took three wickets in three consecutive balls was traditionally given a hat by his club. The phrase then spread to football and many other sports."],
  ["Which country hosted the 2010 FIFA World Cup — the first held in Africa?",["South Africa","Nigeria","Egypt","Kenya"],0,"South Africa's 2010 World Cup was historic as the first on African soil. Vuvuzelas — long plastic horns — became the tournament's defining sound, heard in every broadcast around the world."],
  ["What is the fastest ball sport in the world?",["Badminton","Golf","Tennis","Cricket"],0,"Badminton shuttlecocks can reach 493 km/h, making it the fastest sport involving a projectile. A golf ball can travel at 340 km/h, and a tennis serve has reached 263 km/h."],
  ["Who was Pelé?",["A Brazilian footballer widely regarded as the greatest of all time","An Argentine boxer","A Jamaican sprinter","A South African rugby player"],0,"Pelé won three World Cups with Brazil (1958, 1962, 1970) and scored over 1,000 career goals. He was the only player ever to win three World Cups. He is the only person ever to be declared a 'national treasure' by Brazil's government."],
  ["In rugby union, how many points is a try worth?",["5","3","4","7"],0,"A try is scored when a player touches the ball down in the opponent's in-goal area. The name comes from the old rules where touching the ball down gave you a 'try' at kicking a goal — back then only the kick scored points!"],
  ["What is the Tour de France?",["The world's most prestigious annual cycling race","A marathon race through France","A Formula One race","A sailing competition"],0,"The Tour de France has been held since 1903 (with breaks for the World Wars) and covers about 3,500 km over 21 stages. Riders climb over 50,000 metres of elevation — equivalent to climbing Everest six times!"],
  ["In which sport would you find the terms 'love', 'deuce', and 'advantage'?",["Tennis","Badminton","Squash","Table Tennis"],0,"In tennis, 'love' means zero — possibly from the French 'l'oeuf' (egg), referring to the oval shape of zero. 'Deuce' comes from the French 'deux' (two), as two points are needed to win from that position."],
  ["What are the five rings on the Olympic flag said to represent?",["The five continents","Five founding countries","Five sports","Five decades of the Games"],0,"The five interlocking rings (blue, yellow, black, green, red) represent the five inhabited continents. The colours were chosen because at least one of them appears in the flag of every nation in the world."],
  ["Which sport uses the term 'Grand Slam'?",["Tennis (and golf, rugby, and cricket)","Football only","Baseball only","Badminton only"],0,"In tennis, a Grand Slam is winning all four major tournaments (Australian Open, French Open, Wimbledon, US Open) in one year. In golf it means winning all four majors. In rugby it means beating all opponents in a Six Nations season."],
  ["Who won the first-ever FIFA Women's World Cup in 1991?",["USA","Germany","Norway","Sweden"],0,"The USA won the inaugural Women's World Cup in China, beating Norway 2-1 in the final. The USA has dominated women's football, winning the tournament four times — more than any other nation."],
  ["What is the martial art of sumo?",["A Japanese style of wrestling where you push the opponent out of a ring","A Chinese kicking art","A Korean sword-fighting discipline","A Japanese throwing art"],0,"Sumo is Japan's national sport, dating back over 1,500 years. Rituals like throwing salt to purify the ring before a match come from the sport's Shinto religious origins. Matches often last only seconds."],
  ["In which sport would you encounter a 'googly'?",["Cricket","Baseball","Tennis","Badminton"],0,"A googly is a delivery bowled by a right-arm leg-spin bowler that turns the opposite way to a standard leg-break. It's designed to deceive the batsman. It was invented around 1900 by English cricketer B.J.T. Bosanquet."],
  ["Who was Muhammad Ali?",["A heavyweight boxing champion and civil rights activist","A football player","A basketball star","An Olympic sprinter"],0,"Ali is widely regarded as the greatest boxer of all time. He won the heavyweight title three times, was an outspoken opponent of the Vietnam War, and was known for his poetry, charisma, and unmatched confidence. He said: 'Float like a butterfly, sting like a bee.'"],
  ["What is the Ashes cricket series?",["A biennial series between England and Australia","An annual one-day series","A World Cup tournament","A test series involving three nations"],0,"The Ashes name comes from an 1882 satirical obituary that said English cricket had died and 'the body will be cremated and the ashes taken to Australia'. A small urn (possibly containing ashes of a cricket ball) has been contested between the two nations ever since."],
  ["In American football, how many points is a touchdown worth?",["6","7","3","4"],0,"A touchdown scores 6 points, and the scoring team then gets an opportunity to kick an extra point (or attempt a 2-point conversion). A field goal is worth 3 points, and a safety is worth 2 points."],
  ["Which country has won the most Rugby World Cups?",["New Zealand","South Africa","Australia","England"],0,"New Zealand's All Blacks have won the Rugby World Cup four times (1987, 2011, 2015, 2023). Their pre-match Haka — a Maori war dance — is one of sport's most iconic pre-game rituals."],
  ["Who held the world heavyweight boxing title for the longest uninterrupted period?",["Joe Louis","Muhammad Ali","Mike Tyson","Lennox Lewis"],0,"Joe Louis held the heavyweight title for 11 years and 252 days (1937–1949), defending it 25 times — both records that still stand. He was a symbol of hope for Black Americans during the era of segregation."],
  ["What is the maximum break in snooker?",["147","140","155","135"],0,"A maximum break of 147 requires potting all 15 reds (each followed by the black) then all the colours in order. It's called a 'maximum', 'total clearance', or a '147'. Ronnie O'Sullivan once made one in 5 minutes 20 seconds — the fastest ever."],
  ["What sport was originally called 'Mintonette'?",["Volleyball","Badminton","Table Tennis","Squash"],0,"Volleyball was invented by William Morgan in 1895 as a less intense alternative to basketball for older men. The name was changed to 'volleyball' at its first public demonstration because players kept volleying the ball back and forth."],
  ["Which Jamaican athlete holds multiple world records in sprinting?",["Usain Bolt","Asafa Powell","Yohan Blake","Shelly-Ann Fraser-Pryce"],0,"Usain Bolt holds world records in the 100m (9.58s), 200m (19.19s), and 4x100m relay (36.84s). He is the only sprinter to win both the 100m and 200m at three consecutive Olympics (2008, 2012, 2016)."],
  ["What is the name of the annual boat race on the Thames between Oxford and Cambridge?",["The Boat Race","The Oxford-Cambridge Regatta","The Thames Cup","The University Rowing Championship"],0,"The Boat Race has been held since 1829, making it one of the world's oldest sporting events. The crews row 6.8 km from Putney to Mortlake. Cambridge leads the overall tally but Oxford has had many winning eras."],
],

food:[
  ["Where did the tomato originally come from before spreading worldwide?",["South America","Italy","Spain","Mexico"],0,"Tomatoes are native to western South America and were brought to Europe by Spanish conquistadors in the 1500s. Many Europeans initially thought they were poisonous — they are related to deadly nightshade!"],
  ["Which country gifted the croissant to the world, though it's now associated with France?",["Austria","France","Germany","Hungary"],0,"The croissant evolved from the Austrian 'kipferl'. A Viennese baker brought it to Paris in 1838–39, and French bakers adapted the recipe by making it with laminated dough — creating the flaky pastry we know today."],
  ["Where does chocolate originally come from?",["Mexico (Mesoamerica)","Switzerland","Belgium","Ghana"],0,"The ancient Maya and Aztec civilisations made bitter chocolate drinks as far back as 2,000 BCE — mixed with chilli! Solid eating chocolate wasn't invented until 1847 by a Bristol company called Fry's."],
  ["Which festival of lights is celebrated by Hindus and Sikhs?",["Diwali","Holi","Eid al-Fitr","Songkran"],0,"Diwali celebrates the victory of light over darkness. People light oil lamps (diyas), set off fireworks, share sweets, and wear new clothes. It's celebrated across India, Nepal, Fiji, Trinidad, and many diaspora communities worldwide."],
  ["What is jollof rice?",["A West African rice dish cooked in tomatoes and spices","An East African porridge","A North African couscous dish","A South African braai dish"],0,"Jollof rice is one of West Africa's most beloved dishes. The 'jollof wars' debate between Ghana and Nigeria about whose version is superior is one of the internet's most passionate ongoing food arguments!"],
  ["Which country is the world's largest producer of coffee?",["Brazil","Ethiopia","Colombia","Vietnam"],0,"Brazil has been the world's largest coffee producer for over 150 years. But coffee was first discovered in Ethiopia — legend says a goat herder named Kaldi noticed his goats became energetic after eating the red berries of a certain plant."],
  ["What is the traditional Chinese New Year animal cycle based on?",["12 animals in rotation","The positions of stars","The harvest season","Monthly lunar phases"],0,"The 12 Chinese zodiac animals are: rat, ox, tiger, rabbit, dragon, snake, horse, goat, monkey, rooster, dog, and pig. Each year is associated with one animal, cycling in a 12-year pattern."],
  ["Which spice was historically more valuable than gold by weight?",["Saffron","Black Pepper","Cinnamon","Turmeric"],0,"Saffron requires hand-harvesting of stigmas from crocus flowers — it takes about 75,000 flowers to produce just one pound. At its most expensive, real saffron can cost more than £10,000 per kg."],
  ["Which fruit is known as the 'king of fruits' in Southeast Asia?",["Durian","Mango","Jackfruit","Rambutan"],0,"Durian is so pungent it's banned on public transport and in many hotels across Singapore and Thailand. But across Southeast Asia, it's passionately loved — described as tasting like 'custard infused with almonds' to enthusiasts."],
  ["Which ancient civilisation invented the first bread?",["Ancient Egyptians","Greeks","Romans","Mesopotamians"],0,"The ancient Egyptians were baking leavened bread over 4,000 years ago. They discovered fermentation by accident — wild yeast in the air made dough rise. They used bread as currency and included loaves in tombs for the afterlife."],
  ["What is Eid al-Fitr?",["A Muslim festival marking the end of Ramadan","A harvest festival","An Islamic new year celebration","A festival of lights"],0,"Eid al-Fitr ends the month of Ramadan during which Muslims fast from dawn to sunset. It's celebrated with communal prayer, feasting, giving to charity (Zakat al-Fitr), and sharing special foods like baklava, sheer khurma, and kahk."],
  ["Where do potatoes originally come from?",["South America (Peru and Bolivia)","Ireland","Russia","Germany"],0,"Potatoes were cultivated by the Inca in Peru for over 7,000 years. Spanish explorers brought them to Europe in the 1570s. They transformed European diets — the Irish became so dependent on them that when blight struck in the 1840s, around 1 million people died."],
  ["What is miso soup made from?",["Fermented soybean paste","Rice flour","Fish broth only","Seaweed extract"],0,"Miso is made by fermenting soybeans with salt and a fungus called koji. It's been consumed in Japan for over 1,300 years. There are hundreds of varieties — white miso is mild and sweet, while red miso is aged longer and more intense."],
  ["Which country is famous for inventing sushi?",["Japan","China","South Korea","Thailand"],0,"Sushi originated in Southeast Asia as a method of preserving fish in fermented rice — the rice was thrown away and only the fish eaten. Japanese chefs transformed it into the art form we know today over many centuries."],
  ["What does 'halal' mean in the context of food?",["Permissible according to Islamic law","Vegetarian","Organic and natural","Free from additives"],0,"Halal (meaning 'permissible' in Arabic) covers a comprehensive set of dietary rules in Islam. Similarly, 'kosher' refers to food permissible under Jewish law. Both share some rules — like prohibiting pork — reflecting their shared Abrahamic origins."],
  ["Where does the spice turmeric come from, and why is it golden yellow?",["South Asia — from the root of a plant related to ginger","West Africa","Central America","The Mediterranean"],0,"Turmeric has been used in Indian cooking and medicine for 4,000 years. Its active compound, curcumin, is a powerful anti-inflammatory. It's been used to dye Buddhist monks' robes, as a cosmetic, and as a natural preservative."],
  ["What is Holi?",["A Hindu festival where people throw coloured powder and water at each other","A harvest festival","A festival of lights","A new year celebration"],0,"Holi is celebrated at the start of spring across India, Nepal, and wherever South Asian communities live worldwide. The colours celebrate Prahlada's survival from his evil father — a story of good triumphing over evil."],
  ["Which country is famous for inventing pizza?",["Italy","USA","Greece","Turkey"],0,"Pizza as we know it — with tomato sauce and cheese — was developed in Naples, Italy in the 18th–19th century. The margherita pizza was supposedly created in 1889 in honour of Queen Margherita of Savoy, using ingredients in the colours of the Italian flag."],
  ["What is naan bread?",["A leavened flatbread from South Asia cooked in a tandoor oven","A French sourdough loaf","An unleavened Ethiopian bread","A Turkish pita"],0,"Naan is cooked in a clay tandoor oven at extreme temperatures, giving it its characteristic charred bubbles. It's been eaten across the Indian subcontinent, Central Asia, and the Middle East for centuries. The word 'naan' simply means 'bread' in Persian."],
  ["What is injera?",["A sour flatbread from Ethiopia that doubles as a plate","A Nigerian pepper soup","A Kenyan meat stew","A Somali rice dish"],0,"Injera is made from teff — a tiny grain native to Ethiopia. It ferments for 2–3 days before cooking, giving it a distinctive sour taste. Communal meals in Ethiopia are eaten by tearing injera and using it to scoop shared dishes — no cutlery needed."],
